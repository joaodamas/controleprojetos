<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AXON - Redirect</title>
  <meta http-equiv="refresh" content="0; url=./public/index.html" />
  <style>
    html, body { height: 100%; }
    body {
      margin: 0;
      font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
      background: #0b1220;
      color: #e2e8f0;
      display: grid;
      place-items: center;
    }
    .card {
      width: min(720px, calc(100vw - 32px));
      border: 1px solid rgba(148, 163, 184, 0.25);
      background: rgba(15, 23, 42, 0.72);
      border-radius: 14px;
      padding: 18px 18px;
      box-shadow: 0 18px 60px rgba(0,0,0,.35);
    }
    .title { font-weight: 700; font-size: 16px; margin: 0 0 8px; }
    .muted { margin: 0 0 12px; color: rgba(226,232,240,.8); font-size: 13px; }
    a { color: #60a5fa; text-decoration: none; font-weight: 600; }
    a:hover { text-decoration: underline; }
  </style>
</head>
<body>
  <div class="card">
    <p class="title">Redirecionando...</p>
    <p class="muted">
      Se nada acontecer, abra:
      <a href="./public/index.html">public/index.html</a>
    </p>
  </div>
  <script>
    // Some environments ignore meta refresh; JS redirect is the fallback.
    try { window.location.replace("./public/index.html"); } catch (_err) {}
  </script>
</body>
</html>
