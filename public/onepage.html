<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <meta http-equiv="Cache-Control" content="no-store, no-cache, must-revalidate, max-age=0" />
  <meta http-equiv="Pragma" content="no-cache" />
  <meta http-equiv="Expires" content="0" />
  <title>OnePage — Monitoramento NFSe</title>
  <script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/jspdf@2.5.1/dist/jspdf.umd.min.js"></script>
  <style>
    :root{
      --bg:#F8FAFC;
      --card:#ffffff;
      --text:#0f172a;
      --muted:#64748b;
      --border:rgba(15,23,42,.08);
      --shadow:0 6px 18px rgba(15,23,42,.06);
      --radius:14px;
      --radius-xl: 28px;

      --ok:#2f8f61;
      --warn:#c76b1a;
      --bad:#9b1c23;

      --primary:#0ea5e9;
      --primary2:#2563eb;

      --baseline:#0f172a;
      --real:#c76b1a;
      --shell-bg: #f3f6f9;
    }

    *{ box-sizing:border-box; }
    body{
      margin:0;
      font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Arial, "Apple Color Emoji","Segoe UI Emoji";
      font-weight: 600;
      background:var(--bg);
      color:var(--text);
    }
    /* Default: strong typography, but not washed out. */
    b, strong{ font-weight: 700; }

    /* Contrast tuning (labels were getting too pale). */
    .bi-sub,
    .curveHeader p,
    .curveLegend,
    .metaBlock .k,
    .kpiTitle,
    .kpiSub2,
    .noteMeta,
    .miniTag{ color: #64748b; }

    .bi-title,
    .kpiValue,
    .kpiValue2,
    .noteTitle{ font-weight: 750; }

    .op-shell{
      min-height: 100vh;
      background: var(--shell-bg);
      padding: 20px 0 30px;
    }

    .op-canvas{
      width: 100%;
      max-width: 1440px;
      margin: 0 auto;
      padding: 0 16px;
    }

    .page,
    #app{
      width: 100%;
      margin: 0;
      padding: 0;
      display:grid;
      gap:12px;
    }

    /* ------------------------------------------------------------------
       New OnePage layout (React-like UI) - uses existing colors/rules
    ------------------------------------------------------------------ */

    /* ------------------------------------------------------------------
       OnePage BI layout (new model)
    ------------------------------------------------------------------ */
    .bi{
      display:grid;
      gap: 16px;
    }

    .bi-card{
      background: var(--card);
      border: 1px solid var(--border);
      box-shadow: var(--shadow);
      border-radius: var(--radius-xl);
      padding: 18px;
      min-width: 0;
    }

    .bi-header{
      display:flex;
      align-items:flex-end;
      justify-content: space-between;
      gap: 16px;
      flex-wrap: wrap;
    }

    .bi-brand{
      display:flex;
      align-items:center;
      gap: 14px;
      min-width: 0;
    }

    .bi-logo{
      width: 56px;
      height: 56px;
      border-radius: 22px;
      background: #0f172a;
      box-shadow: 0 18px 40px rgba(15,23,42,.10);
      display:grid;
      place-items:center;
      color: #ffffff;
      flex: 0 0 auto;
    }

    .bi-brandTop{
      display:flex;
      align-items:center;
      gap: 10px;
      min-width: 0;
    }

    .bi-live{
      font-size: 10px;
      font-weight: 450;
      letter-spacing: .14em;
      text-transform: uppercase;
      padding: 4px 8px;
      border-radius: 999px;
      background: #2563eb;
      color: #fff;
      flex: 0 0 auto;
    }

    .bi-title{
      font-size: clamp(22px, 2.5vw, 32px);
      font-weight: 450;
      letter-spacing: -0.02em;
      text-transform: uppercase;
      color: #0f172a;
      white-space: nowrap;
    }

    .bi-sub{
      margin-top: 4px;
      font-size: 13px;
      font-weight: 450;
      color: #94a3b8;
      display:flex;
      align-items:center;
      gap: 8px;
      min-width: 0;
      white-space: nowrap;
      overflow:hidden;
      text-overflow: ellipsis;
      max-width: 520px;
    }

    .bi-projectName{
      margin-top: 6px;
      font-size: clamp(14px, 1.6vw, 18px);
      font-weight: 450;
      letter-spacing: -0.01em;
      color: #0f172a;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      max-width: 520px;
    }

    .bi-headPills{
      display:flex;
      align-items:stretch;
      gap: 12px;
      flex-wrap: wrap;
      background: rgba(255,255,255,.92);
      border: 1px solid rgba(226,232,240,.9);
      box-shadow: 0 18px 60px rgba(15,23,42,.08);
      border-radius: 22px;
      padding: 10px;
    }

    .bi-pill{
      padding: 6px 12px;
      border-right: 1px solid rgba(226,232,240,.9);
      display:flex;
      flex-direction: column;
      justify-content: center;
      gap: 4px;
      min-width: 220px;
      max-width: 360px;
    }
    .bi-pill:last-of-type{ border-right: 0; }
    .bi-pill small{
      font-size: 9px;
      font-weight: 450;
      letter-spacing: .14em;
      text-transform: uppercase;
      color: #94a3b8;
    }
    .bi-pill b{
      font-size: 12px;
      font-weight: 450;
      letter-spacing: .04em;
      text-transform: uppercase;
      color: #0f172a;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .bi-pillRow{
      display:flex;
      align-items:center;
      gap: 8px;
      min-width: 0;
    }
    .bi-dot{
      width: 8px;
      height: 8px;
      border-radius: 999px;
      background: #10b981;
      box-shadow: 0 0 0 0 rgba(59,130,246,.0);
      animation: biPulse 1.6s infinite;
      flex: 0 0 auto;
    }
    .bi-dot.warn{ background: #f59e0b; }
    .bi-dot.bad{ background: #ef4444; }
    @keyframes biPulse{
      0%{ box-shadow:0 0 0 0 rgba(59,130,246,.0); }
      40%{ box-shadow:0 0 0 6px rgba(59,130,246,.12); }
      100%{ box-shadow:0 0 0 0 rgba(59,130,246,.0); }
    }

    .bi-export{
      display:inline-flex;
      align-items:center;
      gap: 10px;
      padding: 12px 16px;
      border-radius: 18px;
      background: #0f172a;
      border: 0;
      color: #fff;
      cursor: pointer;
      font-size: 10px;
      font-weight: 450;
      letter-spacing: .14em;
      text-transform: uppercase;
      box-shadow: 0 10px 30px rgba(15,23,42,.16);
      white-space: nowrap;
    }
    .bi-export:hover{ background: #111c33; }

    .bi-cardHead{
      margin-bottom: 14px;
      font-size: 10px;
      font-weight: 450;
      letter-spacing: .16em;
      text-transform: uppercase;
      color: #94a3b8;
      padding: 0 6px;
    }

    .bi-milestones{
      display:grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 10px;
    }

    .bi-ms{
      display:flex;
      flex-direction: column;
      gap: 10px;
      min-width: 0;
    }

    .bi-rail{
      display:flex;
      align-items:center;
      gap: 0;
      width: 100%;
    }

    .bi-seg{
      height: 6px;
      flex: 1 1 auto;
      background: rgba(226,232,240,.9);
      position: relative;
    }
    .bi-seg.left{ border-radius: 999px 0 0 999px; }
    .bi-seg.right{ border-radius: 0 999px 999px 0; }
    .bi-seg.done{ background: rgba(16,185,129,.95); }
    .bi-seg.pending{ background: rgba(226,232,240,.9); }
    .bi-seg.active{ background: rgba(226,232,240,.9); }
    .bi-seg.active > i{
      position:absolute;
      inset:0 auto 0 0;
      width: 0%;
      height: 100%;
      background: #2563eb;
      border-radius: inherit;
    }

    .bi-node{
      width: 14px;
      height: 14px;
      border-radius: 999px;
      border: 2px solid rgba(226,232,240,.95);
      background: #fff;
      flex: 0 0 auto;
    }
    .bi-node.done{ background: rgba(16,185,129,.95); border-color: rgba(16,185,129,.95); }
    .bi-node.active{ border-color: #2563eb; background:#fff; }

    .bi-msLabel{
      font-size: 10px;
      font-weight: 450;
      letter-spacing: .10em;
      text-transform: uppercase;
      text-align: center;
      color: #94a3b8;
      white-space: nowrap;
      overflow:hidden;
      text-overflow: ellipsis;
      padding: 0 6px;
    }
    .bi-msLabel.active{ color: #2563eb; }

    /* Flowcards pipeline (executivo) */
    .bi-flowWrap{
      position: relative;
      padding: 8px 4px 2px;
    }
    .bi-flowLine{
      position:absolute;
      left: 6%;
      right: 6%;
      top: 46px;
      height: 1px;
      background: rgba(226,232,240,.95);
      z-index: 0;
    }
    .bi-flow{
      position: relative;
      z-index: 1;
      display:grid;
      grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
      gap: 14px;
      align-items: stretch;
    }
    .bi-flowCard{
      background: #fff;
      border: 1px solid rgba(226,232,240,.95);
      border-radius: 24px;
      padding: 14px 14px 12px;
      display:flex;
      flex-direction: column;
      gap: 10px;
      min-width: 0;
      box-shadow: 0 10px 26px rgba(15,23,42,.06);
      transition: transform .18s ease, border-color .18s ease, box-shadow .18s ease;
    }
    .bi-flowCard.pending{ opacity: .72; }
    .bi-flowCard.active{
      border-color: rgba(37,99,235,.45);
      box-shadow: 0 18px 40px rgba(37,99,235,.12);
      transform: translateY(-2px);
    }
    .bi-flowCard.completed{
      border-color: rgba(16,185,129,.26);
      box-shadow: 0 14px 36px rgba(16,185,129,.10);
    }
    .bi-flowTop{
      display:flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 10px;
    }
    .bi-flowIcon{
      width: 42px;
      height: 42px;
      border-radius: 18px;
      display:grid;
      place-items:center;
      background: rgba(148,163,184,.10);
      color: #94a3b8;
      flex: 0 0 auto;
    }
    .bi-flowIcon svg{ width: 18px; height: 18px; }
    .bi-flowCard.completed .bi-flowIcon{ background: rgba(16,185,129,.12); color:#10b981; }
    .bi-flowCard.active .bi-flowIcon{ background: rgba(37,99,235,.12); color:#2563eb; }
    .bi-flowMeta{
      text-align:right;
      display:flex;
      flex-direction: column;
      align-items: flex-end;
      gap: 6px;
      min-width: 0;
    }
    .bi-flowDate{
      font-size: 10px;
      font-weight: 450;
      letter-spacing: .10em;
      text-transform: uppercase;
      color: #94a3b8;
      white-space: nowrap;
      font-variant-numeric: tabular-nums;
    }
    .bi-flowTag{
      font-size: 8px;
      font-weight: 450;
      letter-spacing: .14em;
      text-transform: uppercase;
      padding: 4px 8px;
      border-radius: 10px;
      border: 1px solid rgba(226,232,240,.95);
      background: rgba(248,250,252,.9);
      color: #64748b;
      white-space: nowrap;
    }
    .bi-flowCard.completed .bi-flowTag{ background: rgba(16,185,129,.10); border-color: rgba(16,185,129,.18); color:#065f46; }
    .bi-flowCard.active .bi-flowTag{ background: rgba(37,99,235,.10); border-color: rgba(37,99,235,.18); color:#1d4ed8; }
    .bi-flowName{
      font-size: 12px;
      font-weight: 450;
      letter-spacing: .10em;
      text-transform: uppercase;
      color: #0f172a;
      white-space: nowrap;
      overflow:hidden;
      text-overflow: ellipsis;
    }
    .bi-flowDesc{
      font-size: 11px;
      font-weight: 450;
      color: #475569;
      line-height: 1.35;
      min-height: 44px;
      display: -webkit-box;
      -webkit-box-orient: vertical;
      -webkit-line-clamp: 3;
      overflow: hidden;
    }
    .bi-flowFoot{
      padding-top: 10px;
      border-top: 1px solid rgba(226,232,240,.85);
      display:flex;
      align-items:center;
      justify-content: flex-end;
      gap: 10px;
    }
    .bi-flowOwner{
      display:flex;
      align-items:center;
      gap: 8px;
      min-width: 0;
    }
    .bi-flowOwner b{
      font-size: 10px;
      font-weight: 450;
      color: #64748b;
      white-space: nowrap;
      overflow:hidden;
      text-overflow: ellipsis;
      max-width: 140px;
    }
    .bi-flowPct{
      font-size: 11px;
      font-weight: 450;
      color: #0f172a;
      font-variant-numeric: tabular-nums;
      white-space: nowrap;
    }
    .bi-flowBar{
      height: 6px;
      width: 100%;
      background: rgba(226,232,240,.85);
      border-radius: 999px;
      overflow:hidden;
    }
    .bi-flowBar i{
      display:block;
      height: 100%;
      width: 0%;
      background: #cbd5e1;
      border-radius: 999px;
    }
    .bi-flowCard.completed .bi-flowBar i{ background: rgba(16,185,129,.95); }
    .bi-flowCard.active .bi-flowBar i{ background: #2563eb; }

    .bi-kpis{
      display:grid;
      grid-template-columns: repeat(12, minmax(0, 1fr));
      gap: 16px;
    }
    .bi-perf{ grid-column: span 12; }
    .bi-deadline{ grid-column: span 12; }
    .bi-actions{ grid-column: span 12; }
    .bi-deadlineWide{ grid-column: span 12; }

    .bi-kpiTop{
      display:flex;
      align-items:flex-start;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 14px;
    }

    .bi-kpiTitle{
      font-size: 10px;
      font-weight: 450;
      letter-spacing: .16em;
      text-transform: uppercase;
      color: #94a3b8;
      margin-bottom: 6px;
    }

    .bi-rating{
      display:inline-flex;
      align-items:center;
      gap: 8px;
      padding: 4px 10px;
      border-radius: 999px;
      border: 1px solid rgba(226,232,240,.9);
      font-size: 9px;
      font-weight: 450;
      letter-spacing: .10em;
      text-transform: uppercase;
      color: #0f172a;
      background: rgba(248,250,252,.9);
      white-space: nowrap;
    }
    .bi-rating.ok{ background: rgba(16,185,129,.08); border-color: rgba(16,185,129,.20); color:#065f46; }
    .bi-rating.warn{ background: rgba(245,158,11,.10); border-color: rgba(245,158,11,.20); color:#92400e; }
    .bi-rating.delayed{ background: rgba(234,88,12,.14); border-color: rgba(234,88,12,.26); color:#c2410c; }
    .bi-rating.bad{ background: rgba(239,68,68,.10); border-color: rgba(239,68,68,.20); color:#991b1b; }

    .bi-perfGrid{
      display:grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 16px;
      align-items: end;
    }

    .bi-metric small{
      display:block;
      font-size: 10px;
      font-weight: 450;
      letter-spacing: .10em;
      text-transform: uppercase;
      color: #94a3b8;
      margin-bottom: 6px;
    }

    .bi-metric b{
      display:block;
      font-size: clamp(22px, 2.5vw, 34px);
      font-weight: 450;
      letter-spacing: -0.02em;
      color: #0f172a;
      font-variant-numeric: tabular-nums;
    }

    .bi-metric.bordered{
      border-left: 1px solid rgba(226,232,240,.9);
      padding-left: 14px;
    }

    .bi-perfBar{
      margin-top: 16px;
      padding-top: 14px;
      border-top: 1px solid rgba(226,232,240,.8);
    }

    .bi-progress{
      width: 100%;
      height: 8px;
      border-radius: 999px;
      background: rgba(226,232,240,.95);
      overflow:hidden;
      position: relative;
    }
    .bi-progress > i{
      display:block;
      height: 100%;
      width: 0%;
      background: #6366f1;
      border-radius: 999px;
    }

    .bi-big{
      font-size: clamp(26px, 3vw, 42px);
      font-weight: 450;
      letter-spacing: -0.02em;
      color: #0f172a;
      font-variant-numeric: tabular-nums;
    }

    .bi-subline{
      margin-top: 4px;
      font-size: 11px;
      font-weight: 450;
      letter-spacing: .08em;
      text-transform: uppercase;
      color: #94a3b8;
    }

    .bi-chip{
      display:inline-flex;
      align-items:center;
      gap: 8px;
      padding: 4px 10px;
      border-radius: 999px;
      border: 1px solid rgba(226,232,240,.9);
      font-size: 9px;
      font-weight: 450;
      letter-spacing: .10em;
      text-transform: uppercase;
      color:#0f172a;
      background: rgba(248,250,252,.9);
      white-space: nowrap;
    }
    .bi-chip.bad{ background: rgba(239,68,68,.10); border-color: rgba(239,68,68,.20); color:#991b1b; }
    .bi-chip.ok{ background: rgba(16,185,129,.08); border-color: rgba(16,185,129,.20); color:#065f46; }

    .bi-main{
      display:grid;
      grid-template-columns: repeat(12, minmax(0, 1fr));
      gap: 16px;
      align-items: stretch;
    }
    .bi-curve{ grid-column: span 12; padding: 22px; }
    /* Right column: single Action Plan card (impediments card removed by request) */
    .bi-side{ grid-column: span 12; display:flex; flex-direction:column; gap: 16px; min-width: 0; }
    .bi-planCard{ flex: 1 1 auto; display:flex; flex-direction:column; min-height: clamp(340px, 48vh, 560px); }

    .bi-curveHead{
      display:flex;
      align-items:flex-start;
      justify-content: space-between;
      gap: 14px;
      flex-wrap: wrap;
      margin-bottom: 14px;
    }
    .bi-curveTitleTop{
      font-size: 10px;
      font-weight: 450;
      letter-spacing: .16em;
      text-transform: uppercase;
      color: #94a3b8;
      margin-bottom: 6px;
    }
    .bi-curveTitle{
      font-size: clamp(16px, 1.8vw, 22px);
      font-weight: 450;
      letter-spacing: -0.02em;
      text-transform: uppercase;
      color: #0f172a;
    }

    .bi-legend{
      display:flex;
      align-items:center;
      gap: 10px;
      flex-wrap: wrap;
      justify-content: flex-end;
    }

    .bi-legendItem{
      display:inline-flex;
      align-items:center;
      gap: 8px;
      padding: 6px 10px;
      border-radius: 999px;
      border: 1px solid rgba(226,232,240,.9);
      background: rgba(248,250,252,.85);
      font-size: 9px;
      font-weight: 450;
      letter-spacing: .10em;
      text-transform: uppercase;
      color: #64748b;
      white-space: nowrap;
    }

    .bi-key{
      width: 10px;
      height: 10px;
      border-radius: 999px;
      background: #cbd5e1;
    }
    .bi-key.trend{ background: #2563eb; }
    .bi-key.real{ background: var(--warn); }
    .bi-key.today{
      background: transparent;
      width: 14px;
      height: 0;
      border-top: 2px dashed #ef4444;
      border-radius: 0;
    }

    /* Override legacy .svgBox defaults inside the BI layout */
    .bi .svgBox{
      /* Responsive height to avoid oversized cards on smaller screens */
      height: clamp(260px, 46vh, 420px);
      border-radius: 26px;
    }

    .bi-blockersList{
      display:grid;
      gap: 10px;
    }
    .bi-blocker{
      padding: 12px 12px;
      border-radius: 18px;
      border: 1px solid rgba(239,68,68,.20);
      background: rgba(239,68,68,.06);
      display:grid;
      gap: 6px;
      min-width: 0;
    }
    .bi-blockerTop{
      display:flex;
      justify-content: space-between;
      align-items:flex-start;
      gap: 10px;
    }
    .bi-blockerTitle{
      font-size: 12px;
      font-weight: 450;
      color: #0f172a;
      line-height: 1.1;
      min-width: 0;
      overflow:hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .bi-badgeDays{
      font-size: 9px;
      font-weight: 450;
      letter-spacing: .10em;
      text-transform: uppercase;
      padding: 4px 8px;
      border-radius: 999px;
      background: rgba(255,255,255,.8);
      border: 1px solid rgba(239,68,68,.25);
      color: #b91c1c;
      white-space: nowrap;
      flex: 0 0 auto;
    }
    .bi-blockerMeta{
      font-size: 10px;
      font-weight: 450;
      letter-spacing: .08em;
      text-transform: uppercase;
      color: #94a3b8;
      white-space: nowrap;
      overflow:hidden;
      text-overflow: ellipsis;
    }

    .bi-bars{
      display:grid;
      gap: 10px;
      margin-top: 4px;
    }
    .bi-barRow{
      display:grid;
      grid-template-columns: 70px 1fr;
      gap: 10px;
      align-items:center;
    }
    .bi-barRow b{
      font-size: 11px;
      font-weight: 450;
      color: #0f172a;
      overflow:hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .bi-bar{
      height: 10px;
      border-radius: 999px;
      background: rgba(226,232,240,.95);
      overflow:hidden;
      position: relative;
    }
    .bi-bar > i{
      position:absolute;
      inset: 0 auto 0 0;
      width: 0%;
      height: 100%;
      border-radius: 999px;
      background: #6366f1;
    }

    /* Activity columns (Kanban-like) */
    .bi-lists{
      display:grid;
      grid-template-columns: 1fr;
      gap: 14px;
      padding: 14px;
      border-radius: 18px;
      background: rgba(241,245,249,.95);
      border: 1px solid rgba(226,232,240,.95);
      padding-bottom: 16px;
    }
    @media (min-width: 980px){
      .bi-lists{ grid-template-columns: repeat(3, minmax(0, 1fr)); }
    }

    .bi-listCol{

      font-weight: 450;

      white-space: nowrap;
    }

      height: 8px;
      border-radius: 999px;

    }

    .chipPill.status{ background: rgba(59,130,246,.08); border-color: rgba(59,130,246,.16); color: #2563eb; }
    .chipPill.status .dot{ background:#3b82f6; }
    .chipPill.health.ok{ background: rgba(47,143,97,.10); border-color: rgba(47,143,97,.18); color:#1f6b4b; }
    .chipPill.health.ok .dot{ background: var(--ok); }
    .chipPill.health.warn{ background: rgba(199,107,26,.10); border-color: rgba(199,107,26,.18); color:#9a5a12; }
    .chipPill.health.warn .dot{ background: var(--warn); }
    .chipPill.health.bad{ background: rgba(155,28,35,.10); border-color: rgba(155,28,35,.18); color:#9b1c23; }
    .chipPill.health.bad .dot{ background: var(--bad); }
    .chipPill.golive{ background: rgba(15,23,42,.92); border-color: rgba(15,23,42,.92); color:#fff; }
    .chipPill.golive .dot{ background: #fff; }

    .iconBtn{
      width: 36px;
      height: 36px;
      border-radius: 999px;
      border: 1px solid var(--border);
      background: rgba(15,23,42,.02);
      display:grid;
      place-items: center;
      cursor: pointer;
    }
    .iconBtn:hover{ background: rgba(15,23,42,.05); }

    .kpiGrid{
      display:grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 12px;
    }
    .kpi{
      background: var(--card);
      border: 1px solid var(--border);
      box-shadow: var(--shadow);
      border-radius: 16px;
      padding: 16px;
      min-height: 120px;
      display:flex;
      flex-direction: column;
      justify-content: space-between;
      min-width: 0;
    }
    .kpiTopRow{ display:flex; align-items:flex-start; justify-content: space-between; gap: 10px; }
    .kpiTitle{ font-size: 11px; font-weight: 450; color: #94a3b8; text-transform: uppercase; letter-spacing: .14em; }
    .kpiBadge{
      font-size: 10px;
      font-weight: 450;
      text-transform: uppercase;
      letter-spacing: .08em;
      padding: 4px 8px;
      border-radius: 999px;
      border: 1px solid transparent;
      white-space: nowrap;
    }
    .kpiBadge.bad{ background: rgba(155,28,35,.10); border-color: rgba(155,28,35,.18); color:#9b1c23; }
    .kpiBadge.warn{ background: rgba(199,107,26,.10); border-color: rgba(199,107,26,.18); color:#9a5a12; }
    .kpiBadge.ok{ background: rgba(47,143,97,.10); border-color: rgba(47,143,97,.18); color:#1f6b4b; }
    .kpiValue2{ margin-top: 8px; font-size: 26px; font-weight: 450; letter-spacing: -0.02em; }
    .kpiSub2{ margin-top: 4px; font-size: 11px; color: #94a3b8; font-weight: 450; }
    .kpiBar{ margin-top: 10px; width: 100%; height: 6px; border-radius: 999px; background: rgba(148,163,184,.25); overflow: hidden; }
    .kpiBar > i{ display:block; height:100%; width:0%; background: #3b82f6; border-radius: 999px; }

    .kpi.kpi-gap.gap-ok{
      background: rgba(47,143,97,.08);
      border-color: rgba(47,143,97,.18);
    }
    .kpi.kpi-gap.gap-low{
      background: rgba(253,230,138,.35);
      border-color: rgba(245,158,11,.30);
    }
    .kpi.kpi-gap.gap-risk{
      background: rgba(245,158,11,.16);
      border-color: rgba(245,158,11,.34);
    }
    .kpi.kpi-gap.gap-delayed{
      background: rgba(234,88,12,.18);
      border-color: rgba(234,88,12,.34);
    }
    .kpi.kpi-gap.gap-critical{
      background: rgba(155,28,35,.08);
      border-color: rgba(155,28,35,.18);
    }

    .panelGrid{
      display:grid;
      grid-template-columns: 1fr 2.6fr;
      gap: 12px;
      align-items: stretch;
      min-width: 0;
    }
    .stack{
      display:grid;
      gap: 12px;
      min-width: 0;
    }
    .panelCard{
      background: var(--card);
      border: 1px solid var(--border);
      box-shadow: var(--shadow);
      border-radius: 16px;
      padding: 16px;
      min-width: 0;
    }
    .panelTitle{
      font-size: 12px;
      font-weight: 450;
      color: #94a3b8;
      text-transform: uppercase;
      letter-spacing: .12em;
      display:flex;
      align-items:center;
      gap: 8px;
      margin: 0 0 12px;
    }

    .note{
      background: rgba(148,163,184,.12);
      border: 1px solid rgba(148,163,184,.18);
      border-radius: 14px;
      padding: 10px 12px;
      display:flex;
      flex-direction: column;
      gap: 6px;
    }
    .noteTitle{ font-size: 12px; font-weight: 450; color: #334155; }
    .noteMeta{ font-size: 10px; font-weight: 450; text-transform: uppercase; letter-spacing: .08em; color: #94a3b8; }
    .noteMeta.bad{ color:#9b1c23; }
    .noteMeta.warn{ color:#9a5a12; }
    .noteMeta.ok{ color:#1f6b4b; }

    .emptyHint{
      color: #94a3b8;
      font-weight: 450;
      font-size: 12px;
      padding: 8px 0;
    }

    .curveWrap{
      background: var(--card);
      border: 1px solid var(--border);
      box-shadow: var(--shadow);
      border-radius: 16px;
      padding: 16px;
      min-width: 0;
    }
    .curveHeader{
      display:flex;
      align-items:center;
      justify-content: space-between;
      gap: 10px;
      flex-wrap: wrap;
      margin-bottom: 10px;
    }
    .curveHeader h3{
      margin: 0;
      font-size: 12px;
      font-weight: 450;
      color: #94a3b8;
      text-transform: uppercase;
      letter-spacing: .12em;
    }
    .curveHeader p{
      margin: 2px 0 0;
      font-size: 11px;
      color: #94a3b8;
      font-weight: 450;
    }
    .curveLegend{
      display:flex;
      gap: 14px;
      align-items:center;
      font-size: 10px;
      font-weight: 450;
      text-transform: uppercase;
      letter-spacing: .14em;
      color:#94a3b8;
      flex-wrap: wrap;
    }
    .legendLine{ width: 14px; height: 2px; background: rgba(148,163,184,.6); border-radius: 999px; }
    .legendLine.real{ background: var(--warn); }
    .legendLine.today{ background: transparent; border-top: 2px dashed #ef4444; width: 14px; height: 0; }

    .listGrid{
      display:grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 12px;
      min-width: 0;
    }
    .listCard{
      background: var(--card);
      border: 1px solid var(--border);
      box-shadow: var(--shadow);
      border-radius: 16px;
      padding: 16px;
      display:flex;
      flex-direction: column;
      min-width: 0;
    }
    .listHead{
      display:flex;
      align-items:center;
      justify-content: space-between;
      gap: 10px;
      margin-bottom: 10px;
    }
    .listHead h4{
      margin:0;
      font-size: 11px;
      font-weight: 450;
      color:#94a3b8;
      text-transform: uppercase;
      letter-spacing: .14em;
    }
    .miniTag{
      font-size: 10px;
      font-weight: 450;
      padding: 4px 8px;
      border-radius: 999px;
      border: 1px solid rgba(148,163,184,.18);
      background: rgba(148,163,184,.12);
      color:#64748b;
      white-space: nowrap;
    }
    .miniTag.blue{ background: rgba(59,130,246,.12); border-color: rgba(59,130,246,.18); color:#2563eb; }
    .miniTag.red{ background: rgba(155,28,35,.10); border-color: rgba(155,28,35,.18); color:#9b1c23; }

    .listBody{ display:grid; gap: 8px; margin-top: 2px; flex: 1; }
    .rowItem{
      background: rgba(148,163,184,.10);
      border: 1px solid rgba(148,163,184,.14);
      border-radius: 14px;
      padding: 10px 12px;
      display:flex;
      align-items:center;
      justify-content: space-between;
      gap: 10px;
      min-width: 0;
    }
    .rowItem:hover{ border-color: rgba(47,143,97,.22); }
    .rowItemText{ min-width: 0; display:flex; flex-direction: column; gap: 4px; }
    /* Activities: keep normal weight (no bold) */
    .rowItemTitle{ font-size: 12px; font-weight: 500 !important; color:#334155; white-space: nowrap; overflow:hidden; text-overflow: ellipsis; }
    .rowItemMeta{ font-size: 10px; font-weight: 450 !important; color:#64748b; white-space: nowrap; overflow:hidden; text-overflow: ellipsis; }
    .rowItem b, .rowItem strong{ font-weight: inherit !important; }
    .rowItemRight{ display:flex; flex-direction: column; align-items: flex-end; gap: 6px; }
    .statusSmall{
      font-size: 10px;
      font-weight: 450 !important;
      text-transform: uppercase;
      letter-spacing: .08em;
      padding: 4px 8px;
      border-radius: 999px;
      border: 1px solid transparent;
      white-space: nowrap;
    }
    .statusSmall.ok{ background: rgba(47,143,97,.10); border-color: rgba(47,143,97,.18); color:#1f6b4b; }
    .statusSmall.warn{ background: rgba(59,130,246,.10); border-color: rgba(59,130,246,.18); color:#2563eb; }
    .statusSmall.bad{ background: rgba(155,28,35,.10); border-color: rgba(155,28,35,.18); color:#9b1c23; }

    @media (max-width: 1040px){
      .op-canvas{ width: 100%; }
    }
    @media (max-width: 980px){
      .kpiGrid{ grid-template-columns: repeat(2, minmax(0, 1fr)); }
      .panelGrid{ grid-template-columns: 1fr; }
      .listGrid{ grid-template-columns: 1fr; }
    }

    /* Header */
    .header{
      display:flex;
      flex-direction:column;
      gap:10px;
      align-items:flex-start;
    }
    .title{
      display:flex;
      flex-direction:column;
      gap:10px;
    }
    .title h1{
      margin:0;
      font-size: 26px;
      letter-spacing:.2px;
    }
    .chips{
      display:flex;
      gap:10px;
      flex-wrap:wrap;
    }
    .chip{
      background: rgba(15,23,42,.03);
      border:1px solid var(--border);
      border-radius: 999px;
      padding: 8px 10px;
      display:flex;
      gap:8px;
      align-items:baseline;
      line-height:1;
    }
    .chip small{
      color:var(--muted);
      font-size: 10px;
      text-transform:uppercase;
      letter-spacing:.6px;
    }
    .chip b{
      font-size: 12px;
      font-weight: 450;
    }

    .headerRight{
      display:flex;
      gap:10px;
      align-items:center;
      justify-content:flex-start;
      flex-wrap:wrap;
    }
    .headerRight .chips{
      justify-content:flex-start;
    }

    /* Badges */
    .badge{
      border:1px solid var(--border);
      background:var(--card);
      border-radius:999px;
      padding: 8px 12px;
      display:flex;
      gap:8px;
      align-items:center;
      box-shadow: var(--shadow);
      white-space:nowrap;
    }
    .badge .dot{
      width:10px;height:10px;border-radius:999px;
      background: var(--muted);
    }
    .badge strong{ font-size:12px; }
    .badge span{ font-size:12px; color:var(--muted); }

    .dot.ok{ background:var(--ok); }
    .dot.warn{ background:var(--warn); }
    .dot.bad{ background:var(--bad); }

    .action-btn{
      border:1px solid var(--border);
      background:var(--card);
      border-radius:999px;
      padding: 8px 12px;
      font-size:12px;
      font-weight: 450;
      color:var(--text);
      cursor:pointer;
      box-shadow: var(--shadow);
      white-space:nowrap;
    }
    .action-btn:hover{ filter: brightness(0.98); }

    /* Cards */
    .card{
      background:var(--card);
      border:1px solid var(--border);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      overflow:hidden;
      min-width:0;
    }
    .cardHeader{
      padding: 12px 14px 10px;
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:10px;
      border-bottom:1px solid rgba(15,23,42,.06);
    }
    .cardHeader h2{
      margin:0;
      font-size: 12px;
      letter-spacing:.6px;
      text-transform: uppercase;
      color: var(--muted);
      font-weight: 450;
    }
    .cardBody{ padding: 12px 14px; }

    /* KPI row */
    .kpis{
      display:grid;
      grid-template-columns: repeat(4, minmax(180px, 1fr));
      gap:12px;
    }
    .kpiTop{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:10px;
      flex-wrap:wrap;
    }
    .kpiValue{
      font-size: 26px;
      font-weight: 450;
      letter-spacing:-.4px;
    }
    .kpiSub{
      margin-top:6px;
      color:var(--muted);
      font-size: 12px;
    }
    .bar{
      margin-top:10px;
      height:10px;
      background: rgba(15,23,42,.06);
      border-radius:999px;
      overflow:hidden;
    }
    .bar > i{
      display:block;
      height:100%;
      width:0%;
      background: linear-gradient(90deg, var(--primary), var(--primary2));
      border-radius:999px;
    }

    .pill{
      display:inline-flex;
      align-items:center;
      gap:8px;
      padding:6px 10px;
      border-radius:999px;
      border:1px solid var(--border);
      background: rgba(15,23,42,.02);
      font-size:12px;
      color: var(--muted);
      white-space:nowrap;
    }
    .pill b{ color:var(--text); }

    .kpi-card .cardBody{
      display:flex;
      flex-direction:column;
      justify-content:center;
      min-height:82px;
    }

    .healthTag{
      display:inline-flex;
      align-items:center;
      gap:8px;
      border-radius:999px;
      padding:6px 10px;
      border:1px solid var(--border);
      font-size:12px;
      white-space:nowrap;
    }
    .healthTag.ok{ background: rgba(47,143,97,.12); color: #1f6b4b; }
    .healthTag.warn{ background: rgba(199,107,26,.12); color: #9a5a12; }
    .healthTag.bad{ background: rgba(155,28,35,.12); color: #9b1c23; }

    .gap-card.gap-ok{ background: rgba(47,143,97,.10); border-color: rgba(47,143,97,.24); }
    .gap-card.gap-low{ background: rgba(253,230,138,.35); border-color: rgba(245,158,11,.30); }
    .gap-card.gap-risk{ background: rgba(245,158,11,.16); border-color: rgba(245,158,11,.34); }
    .gap-card.gap-delayed{ background: rgba(234,88,12,.18); border-color: rgba(234,88,12,.34); }
    .gap-card.gap-critical{ background: rgba(155,28,35,.12); border-color: rgba(155,28,35,.3); }
    .gap-card.gap-ok .kpiValue,
    .gap-card.gap-ok .kpiSub{ color: #2f8f61; }
    .gap-card.gap-low .kpiValue,
    .gap-card.gap-low .kpiSub{ color: #92400e; }
    .gap-card.gap-risk .kpiValue,
    .gap-card.gap-risk .kpiSub{ color: #b45309; }
    .gap-card.gap-delayed .kpiValue,
    .gap-card.gap-delayed .kpiSub{ color: #c2410c; }
    .gap-card.gap-critical .kpiValue,
    .gap-card.gap-critical .kpiSub{ color: #9b1c23; }

    /* Mid row: curve + urgent */
    .mid{
      display:grid;
      grid-template-columns: 1fr;
      gap:12px;
      align-items:stretch;
    }

    .curveWrap{
      display:flex;
      flex-direction:column;
      gap:10px;
    }

    .curve-card{
      border-radius:32px;
      border:1px solid #eef2f6;
      padding:24px;
    }

    .curve-head{
      display:flex;
      align-items:flex-end;
      justify-content:space-between;
      gap:16px;
      margin-bottom:12px;
    }

    .curve-kicker{
      font-size:10px;
      font-weight: 450;
      text-transform:uppercase;
      letter-spacing:.2em;
      color:#94a3b8;
    }

    .curve-title{
      margin:6px 0 0;
      font-size:28px;
      font-weight: 450;
      letter-spacing:-.02em;
      color:#0f172a;
    }

    .curve-dot{
      color:#10b981;
    }

    .curve-head-stats{
      display:flex;
      gap:16px;
      align-items:flex-end;
    }

    .curve-stat{
      display:flex;
      flex-direction:column;
      gap:4px;
      text-align:right;
      font-variant-numeric: tabular-nums;
    }

    .curve-stat-label{
      font-size:9px;
      font-weight: 450;
      text-transform:uppercase;
      letter-spacing:.2em;
      color:#94a3b8;
    }

    .curve-stat-value{
      font-size:20px;
      font-weight: 450;
      color:#0f172a;
    }

    .curve-stat-gap{
      padding:8px 12px;
      border-radius:14px;
      border:1px solid rgba(239,68,68,.2);
      background: rgba(239,68,68,.1);
      color:#ef4444;
    }

    .curve-stat-gap.gap-ok{
      background: rgba(16,185,129,.12);
      border-color: rgba(16,185,129,.2);
      color:#10b981;
    }

    .curve-stat-gap.gap-low{
      background: rgba(253,230,138,.35);
      border-color: rgba(245,158,11,.30);
      color:#92400e;
    }

    .curve-stat-gap.gap-risk{
      background: rgba(245,158,11,.16);
      border-color: rgba(245,158,11,.34);
      color:#b45309;
    }

    .curve-stat-gap.gap-delayed{
      background: rgba(234,88,12,.18);
      border-color: rgba(234,88,12,.34);
      color:#c2410c;
    }

    .curve-stat-gap.gap-critical{
      background: rgba(239,68,68,.12);
      border-color: rgba(239,68,68,.24);
      color:#ef4444;
    }

    .curve-stat-gap .curve-stat-label,
    .curve-stat-gap .curve-stat-value{
      color:inherit;
    }

    .curve-legend{
      display:flex;
      gap:10px;
      flex-wrap:wrap;
      margin-bottom:12px;
    }

    .legend-card{
      display:inline-flex;
      align-items:center;
      gap:8px;
      padding:6px 12px;
      border-radius:999px;
      border:1px solid #e2e8f0;
      background:#fff;
      font-size:10px;
      font-weight: 450;
      text-transform:uppercase;
      letter-spacing:.18em;
      color:#64748b;
      white-space:nowrap;
    }

    .legend-line{
      width:18px;
      height:4px;
      border-radius:999px;
      background:#cbd5e1;
    }

    .legend-line.actual{
      background:#10b981;
      box-shadow:0 0 8px rgba(16,185,129,.4);
    }

    .curveMeta{
      display:flex;
      gap:10px;
      flex-wrap:nowrap;
      justify-content:flex-start;
      align-items:center;
    }
    .miniStat{
      display:inline-flex;
      gap:8px;
      align-items:center;
      padding:6px 10px;
      border-radius:999px;
      border:1px solid var(--border);
      background: rgba(15,23,42,.02);
      font-size:12px;
      color: var(--muted);
      white-space:nowrap;
    }
    .miniStat b{ color:var(--text); }
    .legendDot{
      width:10px;height:10px;border-radius:999px;
      background:var(--muted);
    }
    .legendDot.baseline{ background: var(--baseline); }
    .legendDot.real{ background: var(--real); }

    /* Urgent list */
    .list{
      display:flex;
      flex-direction:column;
      gap:10px;
    }
    .items{
      display:flex;
      flex-direction:column;
      gap:10px;
    }
    .item{
      padding:10px 10px;
      border:1px solid rgba(15,23,42,.08);
      border-radius:12px;
      background: rgba(15,23,42,.015);
      display:grid;
      gap:4px;
      min-width:0;
    }
    .itemTop{
      display:flex;
      align-items:flex-start;
      justify-content:space-between;
      gap:10px;
      min-width:0;
    }
    .itemName{
      font-size: 12.5px;
      font-weight: 450;
      line-height:1.2;
      overflow:hidden;
      text-overflow:ellipsis;
      white-space:nowrap;
    }
    .itemMeta{
      font-size: 11px;
      color: var(--muted);
      display:flex;
      gap:8px;
      flex-wrap:wrap;
    }

    .urgent-card .items{
      max-height: 320px;
      overflow:hidden;
    }

    .urgent-card .itemMeta{
      flex-wrap:nowrap;
      white-space:nowrap;
      overflow:hidden;
      text-overflow:ellipsis;
    }
    .tag{
      font-size: 11px;
      padding: 3px 8px;
      border-radius:999px;
      border:1px solid var(--border);
      background: var(--card);
      color: var(--muted);
      white-space:nowrap;
    }
    .tag.bad{ color:#9b1c23; background: rgba(155,28,35,.12); }
    .tag.warn{ color:#9a5a12; background: rgba(199,107,26,.12); }
    .tag.ok{ color:#1f6b4b; background: rgba(47,143,97,.12); }

    /* Bottom lists */
    .bottom{
      display:grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap:12px;
      align-items:stretch;
    }

    /* SVG */
    .svgBox{
      width:100%;
      height:260px;
      border-radius:20px;
      border:1px solid #e2e8f0;
      background:#ffffff;
      overflow:hidden;
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .svgBox svg{ display:block; }

    .curve-evidence-line{
      position:absolute;
      top:0;
      bottom:0;
      width:1px;
      background: rgba(148,163,184,.4);
      display:none;
      pointer-events:none;
    }

    .curve-tooltip{
      position:absolute;
      min-width:160px;
      background: rgba(255,255,255,.75);
