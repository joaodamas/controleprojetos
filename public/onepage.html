    function setupExportButton(){
      const btn = document.getElementById("exportBtn");
      if (!btn) return;
      btn.addEventListener("click", () => {
        // Prefer export via parent app (PDF snapshot) to keep the exact screen layout.
        try {
          if (window.parent && window.parent !== window) {
            window.parent.postMessage({ type: "export-onepage-pdf" }, "*");
            return;
          }
        } catch (_err) {}

        // Standalone (new tab): export locally when libs are available; fallback to print.
        exportOnePagePdfLocal().catch(() => window.print());
      });
    }

    async function exportOnePagePdfLocal(){
      const root = document.getElementById("onepageRoot") || document.body;
      if (!root) throw new Error("Conteudo do relatorio nao encontrado.");
      if (!window.html2canvas) throw new Error("html2canvas nao carregou.");
      const JsPDF = window.jspdf?.jsPDF || window.jsPDF;
      if (!JsPDF) throw new Error("jsPDF nao carregou.");

      const prevWidth = root.style.width;
      // Stabilize layout for consistent capture.
      root.style.width = root.style.width || "1440px";

      const canvas = await window.html2canvas(root, {
        scale: 2,
        useCORS: true,
        backgroundColor: "#f3f6f9"
      });

      const imgData = canvas.toDataURL("image/png");
      const pdf = new JsPDF("p", "mm", "a4");
      const pageW = 210;
      const pageH = 297;
      const imgW = pageW;
      const imgH = (canvas.height * imgW) / canvas.width;

      let y = 0;
      let remaining = imgH;
      while (remaining > 0) {
        pdf.addImage(imgData, "PNG", 0, y, imgW, imgH);
        remaining -= pageH;
        if (remaining > 0) {
          pdf.addPage();
          y -= pageH;
        }
      }

      const nameRaw = (document.title || "OnePage").replace(/\s+/g, " ").trim();
      const nameSafe = nameRaw.replace(/[^\w\s-]/g, "").trim().replace(/\s+/g, "_") || "OnePage";
      pdf.save(`AXON_${nameSafe}.pdf`);

      root.style.width = prevWidth;
    }

    function wireInboundData(app){
      if (!app || window.__onepageInboundWired) return;
      window.__onepageInboundWired = true;
      // Expose a direct hook for the parent app (same-origin iframe) to push data reliably.
      window.__applyOnePageData = (payload) => {
        const nextVm = buildVM(payload || {});
        render(app, nextVm);
        setupExportButton();
      };
      window.addEventListener("message", (ev) => {
        const data = ev?.data;
        if (!data || data.type !== "onepage-data") return;
        const payload = data.payload;
        if (!payload || typeof payload !== "object") return;
        try {
          window.__applyOnePageData(payload);
        } catch (err) {
          console.warn("Falha ao aplicar dados no OnePage.", err);
        }
      });
    }

    function getData(){
      // Dados reais (localStorage do sistema) com fallback para o mock.
      // If the parent app opened this page in a new tab, it can pass a payloadKey
      // that points to a temporary localStorage entry.
      try {
        const params = new URLSearchParams(window.location.search);
        const payloadKey = params.get("payloadKey");
        if (payloadKey) {
          const raw = localStorage.getItem(payloadKey);
          if (raw) {
            const parsed = safeJsonParse(raw);
            const payload = parsed?.payload && typeof parsed.payload === "object" ? parsed.payload : parsed;
            if (payload && typeof payload === "object") {
              // Cleanup: the report is immutable after load.
              try { localStorage.removeItem(payloadKey); } catch (_err) {}
              return payload;
            }
          }
        }
      } catch (_err) {}
      const fromWindow = window.ONEPAGE_DATA;
      if (fromWindow && typeof fromWindow === "object") return fromWindow;
      const systemData = getSystemData();
      return systemData || ONEPAGE_FALLBACK;
    }

    function getSystemData(){
      const baseKey = "controle_projetos_state_v1";
      const rawUserKey = localStorage.getItem("controle_projetos_state_user") || "";
      const userKey = rawUserKey.trim().toLowerCase();
      const keysToTry = userKey ? [`${baseKey}_${userKey}`, baseKey] : [baseKey];
      let raw = null;
      for (const key of keysToTry) {
        raw = safeJsonParse(localStorage.getItem(key));
        if (raw?.clients) break;
      }
      const clients = Array.isArray(raw?.clients) ? raw.clients : [];
      if (!clients.length) return null;

      const params = new URLSearchParams(window.location.search);
      const clientId = params.get("clientId");
      const projectId = params.get("projectId");
      const clientName = params.get("client");
      const projectName = params.get("project");

      const normalize = (value) => String(value || "").trim().toLowerCase();
      let client = null;
      if (clientId) client = clients.find((c) => c.id === clientId);
      if (!client && clientName) client = clients.find((c) => normalize(c.name) === normalize(clientName));
      if (!client) client = clients[0] || null;

      const projects = Array.isArray(client?.projects) ? client.projects : [];
      let project = null;
      if (projectId) project = projects.find((p) => p.id === projectId);
      if (!project && projectName) project = projects.find((p) => normalize(p.name) === normalize(projectName));
      if (!project) project = projects[0] || null;
      if (!project) return null;

      return mapProjectToOnePage(project, client);
    }

    function mapProjectToOnePage(project, client){
      const tasks = extractProjectTasks(project);
      const progressPct = resolveProgressPct(project, tasks);
      const statusLabel = resolveStatusLabel(project, tasks, progressPct);
      const normalizeMember = (value) => String(value || "").trim().replace(/\s+/g, " ");
      const roleKey = (v) =>
        String(v || "")
          .trim()
          .toLowerCase()
          .normalize("NFD")
          .replace(/[\u0300-\u036f]/g, "")
          .replace(/\s+/g, "_");
      const team = Array.isArray(project?.team) ? project.team : [];
      const leaders = team
        .filter((m) => roleKey(m?.role) === "lider_projeto")
        .map((m) => normalizeMember(m?.name))
        .filter(Boolean);
      const devs = team
        .filter((m) => roleKey(m?.role) === "desenvolvedor")
        .map((m) => normalizeMember(m?.name))
        .filter(Boolean);
      const leaderLabel =
        leaders[0] ||
        project?.responsible ||
        project?.leader ||
        project?.lead ||
        "-";
      const fallbackDev = String(project?.developer || project?.dev || "").trim();
      const devList = devs.length
        ? devs
        : (fallbackDev ? fallbackDev.split(/[;,|/]+/g).map((s) => s.trim()).filter(Boolean) : []);
      const developersLabel = devList.length ? devList.join(" / ") : "-";
      return {
        project: {
          name: project?.name || "Projeto",
          client: client?.name || "-",
          leader: leaderLabel,
          developer: developersLabel,
          developers: devList,
          team: Array.isArray(project?.team) ? project.team : [],
          // Back-compat
          responsible: leaderLabel,
          reportDate: project?.reportDate || fmtBR(new Date()),
          statusLabel,
          startDate: project?.start || project?.startDate || "",
          goLiveDate: project?.end || project?.goLiveDate || project?.goLive || ""
        },
        overall: {
          progressPct,
          phaseLabel: project?.phaseLabel || project?.phase || "Em execucao"
        },
        tasks
      };
    }

    function extractProjectTasks(project){
      const directTasks = Array.isArray(project?.tasks)
        ? project.tasks
        : project?.tasks && typeof project.tasks === "object"
          ? Object.values(project.tasks)
          : Array.isArray(project?.items)
            ? project.items
            : Array.isArray(project?.activities)
              ? project.activities
              : [];

      // Some persisted project payloads store tasks grouped under fixed epics.
      // Prefer `project.tasks` when present to match the main project screen, but
      // fall back to `project.epics[].tasks` when `project.tasks` is missing/empty.
      const epicTasks = Array.isArray(project?.epics)
        ? project.epics.flatMap((epic) => epic?.tasks || epic?.items || [])
        : [];

      const chosen = directTasks.length ? directTasks : epicTasks;
      const list = (Array.isArray(chosen) ? chosen : []).filter(Boolean);
      if (!list.length) return list;

      // Remove "macro/package parent" tasks to avoid showing rollup headers (they often have 0%)
      // when the platform uses children tasks (package=macroTitle) as the source of truth.
      const normKey = (value) =>
        String(value ?? "")
          .trim()
          .toLowerCase()
          .normalize("NFD")
          .replace(/[\u0300-\u036f]/g, "")
          .replace(/[_-]+/g, " ")
          .replace(/\s+/g, " ");

      const packageTitles = new Set(
        list
          .map((t) => t?.package || t?.pacote || "")
          .filter(Boolean)
          .map((v) => normKey(v))
          .filter(Boolean)
      );

      if (!packageTitles.size) return list;
      const leaf = list.filter((t) => !packageTitles.has(normKey(t?.title || t?.name || "")));
      return leaf.length ? leaf : list;
    }

    function resolveProgressPct(project, tasks){
      const list = Array.isArray(tasks) ? tasks : [];
      // Same as the project screen: progress is based on done/total tasks.
      return clamp(projectMetricsLocal(list).progress, 0, 100);
    }

    function resolveStatusLabel(project, tasks, progressPct){
      const progress = Number.isFinite(progressPct) ? progressPct : resolveProgressPct(project, tasks);
      if (progress >= 100 && (tasks || []).length) return "Concluido";
      const goLive = parseTaskDate(project?.goLiveDate || project?.goLive || project?.end);
      const today = new Date(); today.setHours(0,0,0,0);
      if (goLive && goLive < today && progress < 100) return "Atrasado";
      if (progress > 0) return "Em andamento";
      return "Nao iniciado";
    }

    function safeJsonParse(value){
      try {
        return value ? JSON.parse(value) : null;
      } catch (err) {
        return null;
      }
    }
  </script>
