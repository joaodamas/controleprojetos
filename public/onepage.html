<body>
  <div class="op-shell">
    <div id="onepageRoot" class="op-canvas">
      <div id="app"></div>
    </div>
  </div>

  <script>
    // ------------------------------------------------------------
    // 1) Fallback (usado apenas se nao houver dados reais)
    // ------------------------------------------------------------
    // - Voce pode substituir esse objeto por dados do seu sistema
    //   (Firestore/JSON/global window...). O render abaixo aceita:
    //   project, overall, tasks (ou listas prontas).
    const ONEPAGE_FALLBACK = {
      project: {
        name: "MONITORAMENTO NFSe",
        client: "ASCENTY",
        responsible: "Lucas Svizzero",
        reportDate: "29/12/2025",
        statusLabel: "Em andamento",
        startDate: "18/12/2025",
        goLiveDate: "02/01/2026",
      },
      overall: {
        progressPct: 38,       // se existir, usaremos como fonte principal
        phaseLabel: "Em Execucao",
      },
      // Se voce ja tem as listas prontas, pode preencher (opcional):
      // lastDone: [...], inProgress: [...], nextSteps: [...], urgent: [...]
      // Se nao preencher, calculamos a partir de tasks.
      tasks: [
        // exemplo (mantenha seus campos; o codigo tenta interpretar)
        { title:"Desenv. Integracao - NFCom", status:"Concluido", due:"24/12/2025", completedAt:"24/12/2025" },
        { title:"Configuracao SSO", status:"Concluido", due:"22/12/2025", completedAt:"22/12/2025" },
        { title:"Desenv. Integracao - Osasco", status:"Concluido", due:"19/12/2025", completedAt:"19/12/2025" },
        { title:"Envio Endpoint e APIKEY", status:"Concluido", due:"18/12/2025", completedAt:"18/12/2025" },

        { title:"Desenv. Integracao - Hortolandia", status:"Em andamento", due:"24/12/2025" },
        { title:"Desenv. Integracao - Paulinia", status:"Em andamento", due:"24/12/2025" },
        { title:"Desenv. Integracao - Sumare", status:"Em andamento", due:"24/12/2025" },
        { title:"Desenv. Integracao - Jundiai", status:"Em andamento", due:"24/12/2025" },

        { title:"Desenv. Integracao - Rio de Janeiro", status:"Nao iniciado", due:"23/12/2025" },
        { title:"Desenv. Integracao - Maracanau", status:"Nao iniciado", due:"23/12/2025" },
        { title:"Desenv. Integracao - Vinhedo", status:"Parado", due:"24/12/2025" },
        { title:"Desenv. Integracao - Campinas", status:"Nao iniciado", due:"24/12/2025" },

        // complemente para total 24...
      ]
    };

    // ------------------------------------------------------------
    // 2) Helpers (datas, status, contagens)
    // ------------------------------------------------------------
    function isValidDate(d){
      return d instanceof Date && !Number.isNaN(d.getTime());
    }

    function parseTaskDate(v){
      if(v == null || v === "") return null;
      // aceita "DD/MM/YYYY" (com hora opcional) ou ISO
      if(typeof v === "string"){
        const raw = v.trim();
        if(!raw) return null;
        // ISO completo (com hora/timezone): deixe o parser nativo lidar para evitar cortar timezone.
        // Exemplos: "2026-01-14T00:00:00.000Z", "2026-01-14T12:30:00-03:00"
        if (raw.includes("T") || raw.endsWith("Z") || /[+-]\d{2}:\d{2}$/.test(raw)) {
          const dIso = new Date(raw);
          if (isValidDate(dIso)) return dIso;
        }
        // BR: 14/01/2026 (accepts extra suffixes like timezones / milliseconds)
        // Examples: "14/01/2026", "14/01/2026 10:30", "14/01/2026 10:30:00.000"
        const br = raw.match(/(\d{2})\/(\d{2})\/(\d{4})(?:\D+(\d{2}):(\d{2})(?::(\d{2}))?)?/);
        if (br) {
          const dd = Number(br[1]);
          const mm = Number(br[2]);
          const yy = Number(br[3]);
          const hh = br[4] != null ? Number(br[4]) : 0;
          const mi = br[5] != null ? Number(br[5]) : 0;
          const ss = br[6] != null ? Number(br[6]) : 0;
          if(!dd||!mm||!yy) return null;
          const d = new Date(yy, mm-1, dd, hh, mi, ss);
          return isValidDate(d) ? d : null;
        }
        // Common dash variant: 14-01-2026
        const brDash = raw.match(/(\d{2})-(\d{2})-(\d{4})/);
        if (brDash) {
          const dd = Number(brDash[1]);
          const mm = Number(brDash[2]);
          const yy = Number(brDash[3]);
          if(!dd||!mm||!yy) return null;
          const d = new Date(yy, mm-1, dd);
          return isValidDate(d) ? d : null;
        }
        const match = raw.match(/(\d{4})-(\d{2})-(\d{2})/);
        if (match) {
          const yy = Number(match[1]);
          const mm = Number(match[2]);
          const dd = Number(match[3]);
          const d = new Date(yy, mm - 1, dd);
          return isValidDate(d) ? d : null;
        }
      }
      const d = new Date(v);
      return isValidDate(d) ? d : null;
    }

    function fmtBR(d){
      if(!d) return "";
      const dd = String(d.getDate()).padStart(2,"0");
      const mm = String(d.getMonth()+1).padStart(2,"0");
      const yy = d.getFullYear();
      return `${dd}/${mm}/${yy}`;
    }

    function daysDiff(a,b){
      // b - a em dias (inteiro)
      const ms = (b.getTime() - a.getTime());
      return Math.floor(ms / (24*3600*1000));
    }

    function addDays(d, n){
      if (!d) return null;
      const out = new Date(d.getTime());
      out.setDate(out.getDate() + Number(n || 0));
      out.setHours(0,0,0,0);
      return out;
    }

    function clamp(n,min,max){ return Math.max(min, Math.min(max,n)); }

    function parsePercentValue(value){
      if (value == null) return null;
      if (typeof value === "number" && Number.isFinite(value)) {
        return value <= 1 && value > 0 ? value * 100 : value;
      }
      if (typeof value === "string") {
        const cleaned = value.replace(",", ".").replace(/[^0-9.-]/g, "");
        if (!cleaned) return null;
        const num = Number(cleaned);
        if (!Number.isFinite(num)) return null;
        return num <= 1 && num > 0 ? num * 100 : num;
      }
      return null;
    }

    function normStatusPlain(s){
      return String(s || "")
        .trim()
        .replace(/^\d+\s*[-.:]?\s*/g, "")
        .toLowerCase()
        .normalize("NFD")
        .replace(/[\u0300-\u036f]/g, "")
        .replace(/[_-]+/g, " ")
        .replace(/\s+/g, " ");
    }

    // Used by list categorization inside the OnePage itself.
    function normStatus(s){
      const v = normStatusPlain(s);
      if (v.includes("concl") || v.includes("done") || v.includes("finaliz") || v.includes("feito")) return "done";
      if (
        v.includes("em validacao") ||
        v.includes("validacao") ||
        v.includes("aguardando validacao") ||
        v.includes("aguardando aprovacao") ||
        v.includes("em andamento") ||
        v.includes("em desenvolvimento") ||
        v.includes("em execucao") ||
        v.includes("em progresso") ||
        v.includes("in progress") ||
        v.includes("doing") ||
        v.includes("atrasad")
      ) {
        return "doing";
      }
      if (v.includes("parad") || v.includes("bloque")) return "blocked";
      if (
        v.includes("nao iniciado") ||
        v.includes("nao iniciada") ||
        v.includes("planej") ||
        v.includes("todo") ||
        v.includes("to do") ||
        v.includes("a fazer") ||
        v.includes("backlog") ||
        v.includes("pend")
      ) {
        return "todo";
      }
      return "todo";
    }

    // Keep progress calculation identical to the main project screen (public/app.js).
    const STATUS_IN_PROGRESS = new Set(
      ["em andamento", "em desenvolvimento", "em execucao", "em progresso", "in progress", "doing", "atrasado"].map(normStatusPlain)
    );
    const STATUS_VALIDATION = new Set(
      ["em validacao", "validacao", "aguardando validacao", "aguardando aprovacao"].map(normStatusPlain)
    );
    const STATUS_DONE = new Set(["concluido", "concluida", "done", "finalizado", "finalizada", "feito", "feita"].map(normStatusPlain));
    const STATUS_BLOCKED = new Set(["parado", "parada", "bloqueado", "bloqueada", "blocked"].map(normStatusPlain));
    const STATUS_PLANNED = new Set(
      [
        "planejado",
        "planejada",
        "nao iniciado",
        "nao iniciada",
        "todo",
        "to do",
        "a fazer",
        "backlog",
        "pendente",
        "pendencia",
        "pendencias"
      ].map(normStatusPlain)
    );

    function getTaskStatusLocal(task){
      return task?.status ?? task?.state ?? task?.activityStatus ?? task?.situacao ?? "";
    }

    function normalizeTaskStatusLocal(status){
      const raw = normStatusPlain(status);
      if (STATUS_DONE.has(raw)) return "concluido";
      if (STATUS_VALIDATION.has(raw)) return "em_validacao";
      if (STATUS_IN_PROGRESS.has(raw)) return "em_andamento";
      if (STATUS_BLOCKED.has(raw) || raw.includes("parad") || raw.includes("bloque")) return "parado";
      if (STATUS_PLANNED.has(raw)) return "planejado";
      // fallback: treat unknown as planned
      return "planejado";
    }

    function isDoneTaskLocal(task){
      return normalizeTaskStatusLocal(getTaskStatusLocal(task)) === "concluido";
    }

    function projectMetricsLocal(tasks = []){
      const list = Array.isArray(tasks) ? tasks : [];
      const total = list.length;
      const done = list.filter((t) => isDoneTaskLocal(t)).length;
      const pending = Math.max(total - done, 0);
      const progress = total ? Math.round((done / total) * 100) : 0;
      return { total, done, pending, progress };
    }

    function healthFromCounts(lateCount){
      if(lateCount <= 0) return "ok";
      if(lateCount <= 3) return "warn";
      return "bad";
    }

    function tagFromDelta(deltaDays){
      if(deltaDays == null) return { cls:"ok", text:"Sem prazo" };
      if(deltaDays > 0) return { cls:"bad", text:`Atrasada +${deltaDays}d` };
      if(deltaDays === 0) return { cls:"warn", text:"Vence hoje" };
      const abs = Math.abs(deltaDays);
      return { cls:"ok", text:`Em dia • ${abs}d` };
    }

    // ------------------------------------------------------------
    // 3) Curva S (PV/EV acumulados por data)
    // ------------------------------------------------------------
    function downsample(points, maxPoints=60){
      if(points.length <= maxPoints) return points;
      const step = (points.length-1)/(maxPoints-1);
      const out = [];
      for(let i=0;i<maxPoints;i++){
        out.push(points[Math.round(i*step)]);
      }
      return out;
    }

    function computeSCurveDaily({ startDate, goLiveDate, reportDate, tasks, progressPct }){
      const start = parseTaskDate(startDate) || new Date();
      const end = parseTaskDate(goLiveDate) || new Date(start.getTime()+7*86400000);
      const reportRaw = parseTaskDate(reportDate) || new Date();
      const startDay = new Date(start.getTime());
      const endDay = new Date(end.getTime());
      const reportDay = new Date(reportRaw.getTime());
      startDay.setHours(0,0,0,0);
      endDay.setHours(0,0,0,0);
      reportDay.setHours(0,0,0,0);
      const clampedReport = reportDay < startDay ? startDay : (reportDay > endDay ? endDay : reportDay);
      const totalDays = Math.max(1, daysDiff(startDay, endDay));

      const validTasks = Array.isArray(tasks) ? tasks : [];

      const normFieldKey = (value) =>
        String(value || "")
          .trim()
          .toLowerCase()
          .normalize("NFD")
          .replace(/[\u0300-\u036f]/g, "")
          .replace(/[^a-z0-9]+/g, "");

      const pickDateField = (task, keys) => {
        if (!task || typeof task !== "object") return null;
        const taskKeys = Object.keys(task);
        for (const k of keys) {
          let raw = null;
          try { raw = task[k]; } catch (_err) { raw = null; }
          const dt = parseTaskDate(raw);
          if (isValidDate(dt)) return dt;
        }
        // Fuzzy match: handle imports that rename keys (spaces, accents, casing).
        for (const k of keys) {
          const want = normFieldKey(k);
          if (!want) continue;
          const found = taskKeys.find((kk) => {
            const got = normFieldKey(kk);
            return got === want || got.includes(want) || want.includes(got);
          });
          if (!found) continue;
          const dt = parseTaskDate(task[found]);
          if (isValidDate(dt)) return dt;
        }
        return null;
      };

      const resolveBaselineStart = (task) =>
        pickDateField(task, [
          "baselineStart",
          "baseline_start",
          "baseline_start_date",
          "baselineInicio",
          "baseline_inicio",
          "baselineBegin",
          "Baseline Start",
          "BaselineStart"
        ]);

      const resolveBaselineFinish = (task) =>
        pickDateField(task, [
          "baselineFinish",
          "baselineEnd",
          "baseline_finish",
          "baseline_end",
          "baseline_end_date",
          "baselineTermino",
          "baseline_termino",
          "baselineFim",
          "baseline_fim",
          "baselineDue",
          "Baseline Finish",
          "Baseline End",
          "BaselineFinish"
        ]);

      const resolveActualFinish = (task) =>
        pickDateField(task, [
          "actualFinish",
          "actual_finish",
          "actual_end",
          "actualEnd",
          "actualEndDate",
          "terminoReal",
          "fimReal",
          "Fim Real",
          "Término Real",
          "TERMINO REAL",
          "dataConclusao",
          "Data Conclusao",
          "Data Conclusão",
          "Data de Conclusao",
          "Data de Conclusão",
          "Conclusao",
          "Conclusão",
          "completedAt",
          "doneAt",
          "finishedAt",
          "Actual Finish",
          "ActualFinish"
        ]);

      const resolveActualStart = (task) =>
        pickDateField(task, [
          "actualStart",
          "actual_start",
          "actual_begin",
          "actualBegin",
          "actualStartDate",
          "Actual Start",
          "ActualStart",
          "dataInicioReal",
          "actualInicio"
        ]);

      const parseWeightValue = (value) => {
        if (value == null) return null;
        if (typeof value === "number" && Number.isFinite(value)) return value > 0 ? value : null;
        const s = String(value || "").trim();
        if (!s) return null;
        const cleaned = s.replace(",", ".").replace(/[^0-9.]+/g, "");
        const n = Number(cleaned);
        return Number.isFinite(n) && n > 0 ? n : null;
      };

      const parseDurationHours = (t) => {
        if (!t) return null;
        const d = t?.duration;
        if (d != null) {
          const n = Number(d);
          if (Number.isFinite(n) && n > 0) return n;
        }
        const s = resolveStartDate(t);
        const e = resolveEndDate(t);
        if (isValidDate(s) && isValidDate(e)) {
          const diffMs = e.getTime() - s.getTime();
          if (diffMs > 0) return Math.max(1, Math.round(diffMs / 3600000));
        }
        return null;
      };
      const taskWeight = (t) => {
        const dur = parseDurationHours(t);
        if (dur != null && dur > 0) return dur;
        const w =
          parseWeightValue(t?.weight) ??
          parseWeightValue(t?.work) ??
          parseWeightValue(t?.hours) ??
          parseWeightValue(t?.effort) ??
          parseWeightValue(t?.cost) ??
          null;
        return w ?? 1;
      };

      const idxNow = Math.max(0, Math.min(totalDays, daysDiff(startDay, clampedReport)));
      const dayIndex = (dt) => {
        if (!isValidDate(dt)) return null;
        const d = new Date(dt.getTime());
        d.setHours(0, 0, 0, 0);
        const diff = daysDiff(startDay, d);
        if (!Number.isFinite(diff)) return null;
        return Math.max(0, Math.min(totalDays, diff));
      };

      // Planned (PV): distribute weights linearly across baseline dates (not the mutable current schedule).
      const plannedInc = Array.from({ length: totalDays + 1 }, () => 0);
      let plannedWeightTotal = 0;
      let hasAnyBaselineDates = false;
      validTasks.forEach((t) => {
        if (!t) return;
        const w = taskWeight(t);
        plannedWeightTotal += w;

        const bs = resolveBaselineStart(t) || resolveStartDate(t) || startDay;
        const bf = resolveBaselineFinish(t) || resolveEndDate(t) || endDay;
        const s = new Date((bs instanceof Date ? bs : startDay).getTime());
        const e = new Date((bf instanceof Date ? bf : endDay).getTime());
        s.setHours(0, 0, 0, 0);
        e.setHours(0, 0, 0, 0);
        if (e < s) e.setTime(s.getTime());
        if (resolveBaselineStart(t) || resolveBaselineFinish(t)) hasAnyBaselineDates = true;

        const i0 = dayIndex(s);
        const i1 = dayIndex(e);
        if (i0 == null || i1 == null) return;
        const daysInclusive = Math.max(1, i1 - i0 + 1);
        const perDay = w / daysInclusive;
        for (let i = i0; i <= i1; i += 1) plannedInc[i] += perDay;
      });
      const totalWeight = plannedWeightTotal > 0 ? plannedWeightTotal : 1;

      const baseline = [];
      let pv = 0;
      for (let d = 0; d <= totalDays; d += 1) {
        pv += plannedInc[d] || 0;
        const day = new Date(startDay.getTime() + d * 86400000);
        baseline.push({ t: day, y: clamp((pv / totalWeight) * 100, 0, 100) });
      }

      // Fallback: if we have no baseline dates at all, keep the old linear planned line.
      if (!hasAnyBaselineDates) {
        for (let d = 0; d <= totalDays; d += 1) {
          const t = d / Math.max(1, totalDays);
          baseline[d].y = t * 100;
        }
      }

      const baseNow = (idxNow != null ? baseline[idxNow].y : 0);
      // Realizado (sem historico): ponto no HOJE calculado do snapshot atual (ponderado por peso).
      // Nao tentamos "reconstruir" o passado sem snapshots.
      let sumW = 0;
      let sumEarned = 0;
      let nonZeroProgressCount = 0;
      validTasks.forEach((t) => {
        if (!t) return;
        const w = taskWeight(t);
        const p = clamp(Number(resolveProgressPct(t) || 0), 0, 100);
        if (p > 0) nonZeroProgressCount += 1;
        sumW += w;
        sumEarned += w * (p / 100);
      });
      const targetNowRaw = parsePercentValue(progressPct);
      const targetNow = targetNowRaw == null ? null : clamp(Number(targetNowRaw), 0, 100);
      // If tasks have no progress fields at all (common on some imports), fall back to the project snapshot progress.
      const realizedByTasks = sumW > 0 ? clamp((sumEarned / sumW) * 100, 0, 100) : 0;
      const realizedToday =
        nonZeroProgressCount > 0
          ? realizedByTasks
          : (targetNow != null ? targetNow : realizedByTasks);

      // Sem historico: tendencia desligada. Usamos um criterio objetivo para acionar o "Plano de acao":
      // maior atraso (em dias) entre tarefas abertas (due < data do report).
      let maxOverdueDays = 0;
      validTasks.forEach((t) => {
        if (!t) return;
        const p = clamp(Number(resolveProgressPct(t) || 0), 0, 100);
        const done = isDoneTaskLocal(t) || p >= 100;
        if (done) return;
        const due = resolveEndDate(t);
        if (!isValidDate(due)) return;
        const d0 = new Date(due.getTime()); d0.setHours(0,0,0,0);
        if (d0.getTime() >= clampedReport.getTime()) return;
        const lateDays = Math.max(0, daysDiff(d0, clampedReport));
        if (lateDays > maxOverdueDays) maxOverdueDays = lateDays;
      });

      const delayDays = maxOverdueDays;
      // EAC simples: fim planejado + maior atraso atual (conservador).
      const eac = delayDays > 0 ? addDays(endDay, delayDays) : new Date(endDay.getTime());
      eac.setHours(0, 0, 0, 0);

      const debug = {
        mode: "no-history",
        total: validTasks.length,
        report: clampedReport,
        idxNow,
        done: validTasks.filter((t) => t && (isDoneTaskLocal(t) || Number(resolveProgressPct(t) || 0) >= 100)).length,
        doneWithActualFinish: 0,
        doneWithCompletedDate: 0,
        doneWithDue: 0,
        doneFallbackReport: 0,
        inProgress: validTasks.filter((t) => t && (Number(resolveProgressPct(t) || 0) > 0 && Number(resolveProgressPct(t) || 0) < 100) && !isDoneTaskLocal(t)).length,
        inProgressWithStart: 0,
        inProgressFallbackReport: 0,
        samples: [],
        weightTotal: sumW,
        realizedToday,
        progressNonZeroCount: nonZeroProgressCount,
        delayDays
      };

      return {
        baseline: downsample(baseline, 60),
        real: [],
        trend: [],
        baselineFull: baseline,
        realFull: [],
        trendFull: [],
        start: startDay, end: endDay,
        report: clampedReport,
        baselineNow: baseNow,
        realizedNow: realizedToday,
        eacDate: eac,
        delayDays,
        debug
      };
    }

    function buildPath(points, w, h, pad, range){
      if(!points || !points.length){
        return { d:"", toX:()=>0, toY:()=>0, tMin: new Date(), tMax: new Date() };
      }
      const x0 = pad, y0 = pad;
      const x1 = w - pad, y1 = h - pad;
      const rangeMin = range?.tMin ?? points[0].t;
      const rangeMax = range?.tMax ?? points[points.length-1].t;
      const tMin = rangeMin instanceof Date ? rangeMin.getTime() : rangeMin;
      const tMax = rangeMax instanceof Date ? rangeMax.getTime() : rangeMax;

      const toX = (t) => {
        const k = (t.getTime()-tMin)/Math.max(1,(tMax-tMin));
        return x0 + k*(x1-x0);
      };
      const toY = (y) => {
        const k = clamp(y,0,100)/100;
        return y1 - k*(y1-y0);
      };

      let d = "";
      points.forEach((p,i)=>{
        const x = toX(p.t);
        const y = toY(p.y);
        d += (i===0 ? `M ${x} ${y}` : ` L ${x} ${y}`);
      });

      return { d, toX, toY, tMin, tMax };
    }

    function renderSCurveSvg({ baseline, start, end, today=new Date(), baselineNow, realizedNow }){
      const w = 920, h = 260;
      const pad = 50;
      const footerPad = 28;
      const svgH = h + footerPad;

      const base = buildPath(baseline, w, h, pad);
      const t = clamp(today.getTime(), start.getTime(), end.getTime());
      const todayX = base.toX(new Date(t));

      const baseToday = Number.isFinite(baselineNow) ? baselineNow : interpolateAt(baseline, t);
      const realToday = Number.isFinite(realizedNow) ? clamp(realizedNow, 0, 100) : 0;
      const gap = Math.round((baseToday - realToday) * 10) / 10;
      const gapInfo = gapStatusFromValue(gap, baseToday, realToday);

      const plannedColor = "#cbd5e1";
      const plannedDot = "#cbd5e1";
      const realColor = gapInfo?.color || "#ef4444";
      const todayColor = "#ef4444";

      const axisColor = "rgba(148,163,184,.18)";
      const gridColor = "rgba(148,163,184,.18)";
      const yTicks = [0, 25, 50, 75, 100];

      const xAxisY = base.toY(0);
      const yTop = base.toY(100);

      const fmtShort = (d) => {
        if (!d) return "";
        const dd = String(d.getDate()).padStart(2, "0");
        const mm = String(d.getMonth() + 1).padStart(2, "0");
        return `${dd}/${mm}`;
      };

      const tickPoints = downsample(baseline, 7);
      const xTicks = tickPoints.map((p) => p.t);

      const plannedDots = tickPoints
        .map((p) => `<circle cx="${base.toX(p.t)}" cy="${base.toY(p.y)}" r="3.5" fill="${plannedDot}" />`)
        .join("");

      const labelPlanned = `${formatPct(baseToday)} Prev.`;
      const labelReal = `${Math.round(realToday)}%`;

      return {
        svg: `
<svg viewBox="0 0 ${w} ${svgH}" width="100%" height="100%" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="realGlow" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="6" stdDeviation="6" flood-color="rgba(239,68,68,0.20)"/>
    </filter>
  </defs>

  ${yTicks
    .map((v) => {
      const yy = base.toY(v);
      return `<line x1="${pad}" y1="${yy}" x2="${w - pad}" y2="${yy}" stroke="${gridColor}" stroke-width="1" stroke-dasharray="3 4"/>`;
    })
    .join("")}

  <!-- axes are intentionally subtle in the BI layout -->
  <line x1="${pad}" y1="${xAxisY}" x2="${w - pad}" y2="${xAxisY}" stroke="${axisColor}" stroke-width="1"/>

  ${yTicks
    .map((v) => {
      const yy = base.toY(v);
      return `<text x="${pad - 10}" y="${yy + 4}" text-anchor="end" font-size="10" fill="#94a3b8" font-weight="450" style="font-variant-numeric: tabular-nums;">${v}%</text>`;
    })
    .join("")}

  ${xTicks
    .map((dt) => {
      const xx = base.toX(dt);
      return `<text x="${xx}" y="${svgH - 8}" text-anchor="middle" font-size="10" fill="#94a3b8" font-weight="450" style="font-variant-numeric: tabular-nums;">${fmtShort(dt)}</text>`;
    })
    .join("")}

  <line x1="${todayX}" y1="${yTop}" x2="${todayX}" y2="${xAxisY}" stroke="${todayColor}" stroke-width="2" stroke-dasharray="6 6"/>

  <path d="${base.d}" fill="none" stroke="${plannedColor}" stroke-width="2"/>
  ${plannedDots}

  <!-- Realizado (sem historico): linha de referencia + ponto no HOJE -->
  <line x1="${pad}" y1="${base.toY(realToday)}" x2="${w - pad}" y2="${base.toY(realToday)}" stroke="${realColor}" stroke-width="2" stroke-dasharray="5 7" opacity="0.30"/>

  <circle cx="${todayX}" cy="${base.toY(baseToday)}" r="4.5" fill="${plannedDot}" stroke="#ffffff" stroke-width="2"/>
  <circle cx="${todayX}" cy="${base.toY(realToday)}" r="5.5" fill="${realColor}" stroke="#ffffff" stroke-width="2"/>

  <text x="${todayX - 8}" y="${base.toY(baseToday) - 14}" text-anchor="end" font-size="10" fill="#94a3b8" font-weight="450">${labelPlanned}</text>
  <text x="${todayX + 10}" y="${base.toY(realToday) + 6}" text-anchor="start" font-size="14" fill="${realColor}" font-weight="450">${labelReal}</text>
</svg>`,
        baseToday, realToday, gap,
        baselineFull: baseline,
        realFull: []
      };
    }

    function interpolateAt(points, tMs){
      if(!points.length) return 0;
      if(tMs <= points[0].t.getTime()) return points[0].y;
      if(tMs >= points[points.length-1].t.getTime()) return points[points.length-1].y;

      for(let i=1;i<points.length;i++){
        const a = points[i-1], b = points[i];
        const ta = a.t.getTime(), tb = b.t.getTime();
        if(tMs >= ta && tMs <= tb){
          const k = (tMs-ta)/Math.max(1,(tb-ta));
          return a.y + k*(b.y-a.y);
        }
      }
      return points[points.length-1].y;
    }

    function valueAtStep(points, tMs){
      if(!points.length) return 0;
      if(tMs <= points[0].t.getTime()) return points[0].y;
      for(let i=points.length-1; i>=0; i--){
        if(tMs >= points[i].t.getTime()) return points[i].y;
      }
      return points[0].y;
    }

    // ------------------------------------------------------------
    // 4) ViewModel: calcula listas e contagens mantendo a logica
    // ------------------------------------------------------------
    function resolveTasksFromPayload(data){
      const toList = (value) => {
        if (Array.isArray(value)) return value.filter(Boolean);
        if (value && typeof value === "object") return Object.values(value).filter(Boolean);
        return [];
      };

      if (Array.isArray(data?.tasks) || (data?.tasks && typeof data.tasks === "object")) {
        const list = toList(data.tasks);
        return { list, path: "data.tasks" };
      }
      if (Array.isArray(data?.items) || (data?.items && typeof data.items === "object")) {
        const list = toList(data.items);
        return { list, path: "data.items" };
      }
      if (Array.isArray(data?.activities) || (data?.activities && typeof data.activities === "object")) {
        const list = toList(data.activities);
        return { list, path: "data.activities" };
      }

      const project = data?.project;
      if (project && typeof project === "object") {
        const direct = toList(project.tasks).length ? toList(project.tasks)
          : toList(project.items).length ? toList(project.items)
            : toList(project.activities);
        if (direct.length) return { list: direct, path: "data.project.(tasks/items/activities)" };

        const epics = Array.isArray(project?.epics) ? project.epics : [];
        const epicTasks = epics.flatMap((e) => (e?.tasks || e?.items || []));
        if (epicTasks.length) return { list: epicTasks.filter(Boolean), path: "data.project.epics[].tasks" };
      }

      // Some callers may wrap the payload (defensive).
      if (data?.payload && typeof data.payload === "object") {
        const inner = resolveTasksFromPayload(data.payload);
        if (inner.list.length) return { list: inner.list, path: `data.payload -> ${inner.path}` };
      }

      return { list: [], path: "none" };
    }

    function buildVM(data){
      const resolved = resolveTasksFromPayload(data || {});
      const tasksIn = resolved.list;
      const metaDataKeys =
        data && typeof data === "object" ? Object.keys(data).slice(0, 80) : [];
      const metaProjectKeys =
        data?.project && typeof data.project === "object" ? Object.keys(data.project).slice(0, 80) : [];
      const metaPayloadKeys =
        data?.payload && typeof data.payload === "object" ? Object.keys(data.payload).slice(0, 80) : [];
      // Normalize per-task progress for UI lists (some sources send only progressPct or localized fields).
      const tasks = tasksIn.map((t) => {
        if (!t || typeof t !== "object") return t;
        const pct = clamp(resolveProgressPct(t), 0, 100);
        // Keep both fields aligned; different widgets read different keys.
        return { ...t, progress: pct, progressPct: pct };
      });

      const today = new Date();
      today.setHours(0,0,0,0);

      const total = tasks.length;
      const statusKey = (t) => normalizeTaskStatusLocal(getTaskStatusLocal(t));
      const done = tasks.filter((t) => statusKey(t) === "concluido");
      const doing = tasks.filter((t) => {
        const k = statusKey(t);
        return k === "em_andamento" || k === "em_validacao";
      });
      const blocked = tasks.filter((t) => statusKey(t) === "parado");
      const todo = tasks.filter((t) => statusKey(t) === "planejado");

      const late = tasks.filter(t=>{
        const k = statusKey(t);
        if(k==="concluido") return false;
        const due = parseTaskDate(t.due || t.dueDate || t.end || t.endDate || "");
        if(!due) return false;
        due.setHours(0,0,0,0);
        return due < today;
      });

      // Progresso: prioridade para overall.progressPct (mantem regra atual)
      // Se nao existir, calcula por concluidas / total.
      const overallProgress = data?.overall ? parsePercentValue(data.overall.progressPct) : null;
      const progressPct = overallProgress != null
        ? clamp(overallProgress, 0, 100)
        : (total ? (done.length / total) * 100 : 0);

      // Ultimas concluidas: top 5 por data de conclusao (com fallback)
      const lastDone = (data.lastDone && data.lastDone.length) ? data.lastDone : done
        .map(t => ({
          ...t,
          _c: parseTaskDate(
            t.dataConclusao ||
            t.completedAt ||
            t.doneAt ||
            t.updatedAt ||
            t.updated_at ||
            t.updatedOn ||
            t.end ||
            t.due ||
            t.start
          ) || new Date(0)
        }))
        .sort((a,b)=>b._c - a._c)
        .slice(0,5);

      // Em andamento: top 5 por due asc
      const inProgress = (data.inProgress && data.inProgress.length) ? data.inProgress : doing
        .map(t => ({...t, _d: parseTaskDate(t.due || t.dueDate || t.end || t.endDate || "")}))
        .sort((a,b)=>(a._d||1e15)-(b._d||1e15))
        .slice(0,5);

      // Proximos passos: top 5 (todo + blocked) por due asc
      const nextSteps = (data.nextSteps && data.nextSteps.length) ? data.nextSteps : [...blocked, ...todo]
        .map(t => ({...t, _d: parseTaskDate(t.due || t.dueDate || t.end || t.endDate || "")}))
        .sort((a,b)=>(a._d||1e15)-(b._d||1e15))
        .slice(0,5);

      // Mais urgente: top 6 por atraso (overdue primeiro) e por due asc
      const urgent = (data.urgent && data.urgent.length) ? data.urgent : tasks
        .filter(t => normStatus(t.status)!=="done")
        .map(t=>{
          const due = parseTaskDate(t.due);
          let delta = null;
          if(due){
            const d0 = new Date(due); d0.setHours(0,0,0,0);
            delta = Math.max(0, daysDiff(d0, today)); // dias atrasados
          }
          return { ...t, _due: due, _lateDays: delta ?? 0 };
        })
        .sort((a,b)=>{
          // atrasadas primeiro, depois menor due
          const aLate = a._lateDays>0 ? 0 : 1;
          const bLate = b._lateDays>0 ? 0 : 1;
          if(aLate!==bLate) return aLate-bLate;
          return (a._due||1e15)-(b._due||1e15);
        })
        .slice(0,5);

      // Saude do cronograma
      const health = healthFromCounts(late.length);

      return {
        project: data.project || {},
        overall: data.overall || {},
        epics: Array.isArray(data.epics) ? data.epics : [],
        tasks,
        meta: {
          tasksPath: resolved.path,
          tasksRawTotal: tasksIn.length,
          dataType: typeof data,
          dataIsArray: Array.isArray(data),
          dataKeys: metaDataKeys,
          projectKeys: metaProjectKeys,
          payloadKeys: metaPayloadKeys
        },
        counts: {
          total,
          done: done.length,
          doing: doing.length,
          late: late.length,
          due7: countDueInDays(tasks, 7),
        },
        progressPct: Math.round(progressPct * 10) / 10,
        health,
        lastDone,
        inProgress,
        nextSteps,
        urgent,
      };

      function countDueInDays(ts, days){
        const limit = new Date(today.getTime() + days*86400000);
        return ts.filter(t=>{
          const st = normStatus(t.status);
          if(st==="done") return false;
          const due = parseTaskDate(t.due);
          if(!due) return false;
          due.setHours(0,0,0,0);
          return due >= today && due <= limit;
        }).length;
      }
    }

    // ------------------------------------------------------------
    // 5) Render
    // ------------------------------------------------------------
    function el(html){
      const t = document.createElement("template");
      t.innerHTML = html.trim();
      return t.content.firstElementChild;
    }

    function healthDot(health){
      if(health==="ok") return "ok";
      if(health==="warn") return "warn";
      return "bad";
    }

    function healthTag(health){
      if(health==="ok") return { cls:"ok", label:"Em dia" };
      if(health==="warn") return { cls:"warn", label:"Risco" };
      return { cls:"bad", label:"Em atraso" };
    }

    function stripAccents(s){
      try{
        return String(s || "").normalize("NFD").replace(/[\u0300-\u036f]/g, "");
      }catch(_err){
        return String(s || "");
      }
    }

    function normKey(s){
      return stripAccents(String(s || "").trim().toUpperCase());
    }

    function parseMembersLocal(task){
      const raw =
        task?.members ??
        task?.member ??
        task?.membros ??
        task?.responsavel ??
        task?.responsible ??
        task?.assignee ??
        task?.owner ??
        "";
      if (Array.isArray(raw)) return raw.map((v) => String(v || "").trim()).filter(Boolean);
      return String(raw || "")
        .split(/[;,]+/g)
        .map((v) => v.trim())
        .filter(Boolean);
    }

    function buildMilestonesFromTasks(tasks){
      const phases = ["LEVANTAMENTO","DESENVOLVIMENTO","TESTES","DEPLOY"];
      const labelMap = { "DEPLOY": "GO LIVE" };
      const list = Array.isArray(tasks) ? tasks : [];

      const phaseKeyOfTask = (t) => {
        const raw = t?.phase || t?.epic || t?.epico || t?.grupo || t?.group || "";
        const k = normKey(raw);
        if (k.includes("LEVANT")) return "LEVANTAMENTO";
        if (k.includes("DESENV")) return "DESENVOLVIMENTO";
        if (k.includes("TEST")) return "TESTES";
        if (k.includes("DEPLOY") || k.includes("IMPLANT") || k.includes("GO LIVE") || k.includes("GOLIVE")) return "DEPLOY";
        return "";
      };

      const statusOf = (progress, total) => {
        if (!total) return "pendente";
        if (progress >= 100) return "concluido";
        if (progress > 0) return "ativo";
        return "pendente";
      };

      const result = phases.map((phase) => {
        const inPhase = list.filter((t) => phaseKeyOfTask(t) === phase);
        const total = inPhase.length;
        const done = inPhase.filter((t) => normStatus(t?.status) === "done").length;
        const progress = total ? clamp((done / total) * 100, 0, 100) : 0;
        return {
          key: phase,
          label: labelMap[phase] || phase,
          total,
          done,
          progress: Math.round(progress),
          status: statusOf(progress, total)
        };
      });

      const activeIdx = result.findIndex((m) => m.status !== "concluido" && (m.total > 0 || m.progress > 0));
      if (activeIdx >= 0) result[activeIdx].active = true;
      else if (result.length) result[result.length - 1].active = true;
      return result;
    }

    function summarizeEpicFromTasks(phase, tasks){
      const p = String(phase || "").toUpperCase();
      if (p === "LEVANTAMENTO") return "Requisitos consolidados.";
      if (p === "DESENVOLVIMENTO") return "Codigo sendo construido.";
      if (p === "TESTES") return "Execucao de QA e validacoes do usuario.";
      if (p === "DEPLOY") return "Liberacao do Ambiente Produtivo.";
      return "";
    }

    function buildFlowCards({ project, tasks }){
      const proj = project || {};
      const list = Array.isArray(tasks) ? tasks : [];
      const ms = buildMilestonesFromTasks(list);
      const byPhase = (key) => list.filter((t) => phaseKeyOfTaskLocal(t) === key);

      const month = ["JAN","FEV","MAR","ABR","MAI","JUN","JUL","AGO","SET","OUT","NOV","DEZ"];
      const fmtShort = (d) => {
        if (!d) return "-";
        const dd = String(d.getDate()).padStart(2, "0");
        const mm = month[d.getMonth()] || "";
        return `${dd} ${mm}`.trim();
      };
      const maxEnd = (ts) => {
        let best = null;
        (ts || []).forEach((t) => {
          const d = resolveEndDate(t);
          if (!d) return;
          if (!best || d > best) best = d;
        });
        return best;
      };

      const tagFor = (m) => {
        if (m.status === "concluido") return "Processado";
        if (m.status === "ativo") return "Em foco";
        return "Agendado";
      };

      const iconSvg = (key) => {
        const k = String(key || "").toUpperCase();
        if (k === "LEVANTAMENTO") {
          return `<svg viewBox="0 0 24 24" fill="none"><path d="M21 21l-4.3-4.3" stroke="currentColor" stroke-width="2" stroke-linecap="round"/><path d="M11 19a8 8 0 1 1 0-16 8 8 0 0 1 0 16Z" stroke="currentColor" stroke-width="2"/></svg>`;
        }
        if (k === "DESENVOLVIMENTO") {
          return `<svg viewBox="0 0 24 24" fill="none"><path d="M8 9l-3 3 3 3" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/><path d="M16 9l3 3-3 3" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/><path d="M14 6l-4 12" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>`;
        }
        if (k === "TESTES") {
          return `<svg viewBox="0 0 24 24" fill="none"><path d="M9 3h6" stroke="currentColor" stroke-width="2" stroke-linecap="round"/><path d="M10 3v5l-5 8a4 4 0 0 0 3.4 6h7.2A4 4 0 0 0 19 16l-5-8V3" stroke="currentColor" stroke-width="2" stroke-linejoin="round"/></svg>`;
        }
        return `<svg viewBox="0 0 24 24" fill="none"><path d="M5 13l4 4L19 7" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/><path d="M12 2a10 10 0 1 0 0 20" stroke="currentColor" stroke-width="2" opacity=".25"/></svg>`;
      };

      const ownerShort = (s) => ownerShortLabel(String(s || "").trim() || "-");
      const leader = String(proj.leader || proj.responsible || "-").trim();
      const dev = String(proj.developer || "-").trim();

      const pickOwner = (phase) => {
        const p = String(phase || "").toUpperCase();
        if (p === "LEVANTAMENTO") return leader && leader !== "-" ? ownerShort(leader) : "-";
        if (p === "DESENVOLVIMENTO") return dev && dev !== "-" ? ownerShort(dev) : (leader && leader !== "-" ? ownerShort(leader) : "-");
        if (p === "TESTES") return "TIME QA";
        return "GESTAO";
      };

      const mk = (phaseKey) => {
        const m = ms.find((x) => x.key === phaseKey) || { progress: 0, status: "pendente", label: phaseKey };
        const phaseTasks = byPhase(phaseKey);
        const endDate = maxEnd(phaseTasks) || parseTaskDate(proj.goLiveDate || proj.goLive || proj.end);
        const statusCls = m.status === "concluido" ? "completed" : m.status === "ativo" ? "active" : "pending";
        const label = phaseKey === "DEPLOY" ? "GO LIVE" : phaseKey;
        const desc = summarizeEpicFromTasks(phaseKey, phaseTasks);
        return {
          key: phaseKey,
          label,
          statusCls,
          progress: clamp(m.progress ?? 0, 0, 100),
          date: fmtShort(endDate),
          tag: tagFor(m),
          owner: pickOwner(phaseKey),
          icon: iconSvg(phaseKey),
          desc
        };
      };

      return [mk("LEVANTAMENTO"), mk("DESENVOLVIMENTO"), mk("TESTES"), mk("DEPLOY")];
    }

    function buildFlowCardsFromEpics(epics, proj) {
      const iconPool = [
        `<svg viewBox="0 0 24 24" fill="none"><path d="M21 21l-4.3-4.3" stroke="currentColor" stroke-width="2" stroke-linecap="round"/><path d="M11 19a8 8 0 1 1 0-16 8 8 0 0 1 0 16Z" stroke="currentColor" stroke-width="2"/></svg>`,
        `<svg viewBox="0 0 24 24" fill="none"><path d="M8 9l-3 3 3 3" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/><path d="M16 9l3 3-3 3" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/><path d="M14 6l-4 12" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>`,
        `<svg viewBox="0 0 24 24" fill="none"><path d="M9 3h6" stroke="currentColor" stroke-width="2" stroke-linecap="round"/><path d="M10 3v5l-5 8a4 4 0 0 0 3.4 6h7.2A4 4 0 0 0 19 16l-5-8V3" stroke="currentColor" stroke-width="2" stroke-linejoin="round"/></svg>`,
        `<svg viewBox="0 0 24 24" fill="none"><path d="M5 13l4 4L19 7" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/><path d="M12 2a10 10 0 1 0 0 20" stroke="currentColor" stroke-width="2" opacity=".25"/></svg>`,
        `<svg viewBox="0 0 24 24" fill="none"><path d="M12 2L2 7l10 5 10-5-10-5z" stroke="currentColor" stroke-width="2" stroke-linejoin="round"/><path d="M2 17l10 5 10-5" stroke="currentColor" stroke-width="2" stroke-linejoin="round"/><path d="M2 12l10 5 10-5" stroke="currentColor" stroke-width="2" stroke-linejoin="round"/></svg>`,
        `<svg viewBox="0 0 24 24" fill="none"><rect x="3" y="3" width="18" height="18" rx="3" stroke="currentColor" stroke-width="2"/><path d="M9 12l2 2 4-4" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>`
      ];
      return epics.map((epic, idx) => {
        const pct = epic.progress ?? 0;
        const statusCls = pct >= 100 ? "completed" : pct > 0 ? "active" : "pending";
        const tag = pct >= 100 ? "Processado" : pct > 0 ? "Em foco" : "Agendado";
        return {
          key: epic.name,
          label: epic.name,
          statusCls,
          progress: Math.round(pct),
          date: "",
          tag,
          owner: "",
          icon: iconPool[idx % iconPool.length],
          desc: `${epic.done || 0} de ${epic.total || 0} concluidas`
        };
      });
    }

    function buildWorkloadFromTasks(tasks){
      const list = Array.isArray(tasks) ? tasks : [];
      const counts = new Map();
      for (const t of list) {
        if (normStatus(t?.status) === "done") continue;
        const members = parseMembersLocal(t);
        for (const m of members) {
          const key = String(m || "").trim();
          if (!key) continue;
          counts.set(key, (counts.get(key) || 0) + 1);
        }
      }
      const palette = ["#6366f1", "#8b5cf6", "#ec4899", "#0ea5e9", "#f59e0b"];
      const sorted = [...counts.entries()]
        .map(([name, tasksCount]) => ({ name, tasksCount }))
        .sort((a, b) => b.tasksCount - a.tasksCount)
        .slice(0, 5);
      return sorted.map((item, idx) => ({ ...item, color: palette[idx % palette.length] }));
    }

    function phaseKeyOfTaskLocal(t){
      const raw = t?.phase || t?.epic || t?.epico || t?.grupo || t?.group || "";
      const k = normKey(raw);
      if (k.includes("LEVANT")) return "LEVANTAMENTO";
      if (k.includes("DESENV")) return "DESENVOLVIMENTO";
      if (k.includes("TEST")) return "TESTES";
      if (k.includes("DEPLOY") || k.includes("IMPLANT") || k.includes("GO LIVE") || k.includes("GOLIVE")) return "DEPLOY";
      return "";
    }
    
    function epicLabelForCard(t){
      const key = phaseKeyOfTaskLocal(t);
      if (!key) return { label: "", cls: "" };
      if (key === "DEPLOY") return { label: "GO LIVE", cls: "dep" };
      if (key === "DESENVOLVIMENTO") return { label: "DESENVOLVIMENTO", cls: "dev" };
      if (key === "LEVANTAMENTO") return { label: "LEVANTAMENTO", cls: "disc" };
      if (key === "TESTES") return { label: "TESTES", cls: "test" };
      return { label: key, cls: "" };
    }

    function buildActionPlan({ tasks, reportDate, startDate, goLiveDate, curveData, projectTeam, delayDays, gapValue, blockers=[] }){
      const list = Array.isArray(tasks) ? tasks : [];
      const today = parseTaskDate(reportDate) || new Date();
      today.setHours(0,0,0,0);

      const start = parseTaskDate(startDate) || today;
      const end = parseTaskDate(goLiveDate) || addDays(today, 14);
      start.setHours(0,0,0,0);
      end.setHours(0,0,0,0);

      const isBusinessDay = (d) => {
        const day = d.getDay();
        return day !== 0 && day !== 6;
      };
      const businessDaysBetween = (a, b) => {
        if (!a || !b) return 0;
        const from = new Date(a.getTime()); from.setHours(0,0,0,0);
        const to = new Date(b.getTime()); to.setHours(0,0,0,0);
        if (to.getTime() === from.getTime()) return 0;
        const dir = to > from ? 1 : -1;
        let cur = new Date(from.getTime());
        let days = 0;
        while (cur.getTime() !== to.getTime()) {
          cur = addDays(cur, dir);
          if (dir > 0) {
            if (cur <= to && isBusinessDay(cur)) days += 1;
          } else {
            if (cur >= to && isBusinessDay(cur)) days -= 1;
          }
        }
        return days;
      };

      const progressOf = (t) => clamp(Number(resolveProgressPct(t) || 0), 0, 100);
      const isDone = (t) => normStatus(t?.status) === "done" || progressOf(t) >= 100;

      const normalizeMember = (value) => String(value || "").trim().replace(/\s+/g, " ");

      const team = Array.isArray(projectTeam) ? projectTeam : [];
      const devList = team
            .filter((m) => String(m?.role || "").toLowerCase() === "desenvolvedor")
            .map((m) => normalizeMember(m?.name))
            .filter(Boolean)
        ;

      const phaseTasks = (phase) => list.filter((t) => phaseKeyOfTaskLocal(t) === phase);
      const dev = phaseTasks("DESENVOLVIMENTO");
      const test = phaseTasks("TESTES");

      const maxEnd = (ts) => {
        let best = null;
        for (const t of ts) {
          const d = resolveEndDate(t);
          if (!d) continue;
          if (!best || d > best) best = d;
        }
        return best;
      };
      const minStart = (ts) => {
        let best = null;
        for (const t of ts) {
          const d = resolveStartDate(t);
          if (!d) continue;
          if (!best || d < best) best = d;
        }
        return best;
      };

      const totalDays = Math.max(1, daysDiff(start, end));
      const approxDevEnd = addDays(start, Math.floor(totalDays * 0.60));
      const approxTestStart = addDays(start, Math.floor(totalDays * 0.60) + 1);

      const plannedDevEnd = maxEnd(dev) || approxDevEnd;
      const plannedTestStart = minStart(test) || approxTestStart || addDays(plannedDevEnd, 1);

      // Target: keep testing start and GoLive; pull-in dev finish if possible.
      const targetDevFinish = addDays(plannedTestStart, -1);

      const openDev = dev.filter((t) => normStatus(t?.status) !== "done").length;
      const daysToDevFinish = Math.max(0, daysDiff(today, targetDevFinish));
      const devPerDay = daysToDevFinish > 0 ? Math.ceil(openDev / daysToDevFinish) : openDev;

      const dd = Math.round(Math.max(0, delayDays || 0));
      const gapTxt = formatGapPlain(gapValue || 0);

      const openTasks = list.filter((t) => !isDone(t));
      const overdueTasks = openTasks.filter((t) => {
        const due = resolveEndDate(t);
        if (!due) return false;
        const d0 = new Date(due.getTime()); d0.setHours(0,0,0,0);
        return d0 < today;
      });
      overdueTasks.sort((a, b) => {
        const da = resolveEndDate(a); const db = resolveEndDate(b);
        return (da ? da.getTime() : 1e15) - (db ? db.getTime() : 1e15);
      });

      // Workload / bottlenecks: count open tasks per assigned member (each member gets 1 unit per task).
      const load = new Map();
      for (const t of openTasks) {
        const members = parseMembersLocal(t);
        const assigned = members.length ? members : [resolveOwnerLabel(t)].filter((x) => x && x !== "-");
        if (!assigned.length) continue;
        assigned.forEach((name) => {
          const key = String(name || "").trim();
          if (!key || key === "-") return;
          load.set(key, (load.get(key) || 0) + 1);
        });
      }

      const loadList = [...load.entries()]
        .map(([name, count]) => ({ name, count }))
        .sort((a, b) => b.count - a.count);

      const normalizeKey = (s) =>
        String(s || "")
          .trim()
          .toLowerCase()
          .normalize("NFD")
          .replace(/[\u0300-\u036f]/g, "");

      const devKeySet = new Set(devList.map((n) => normalizeKey(n)));
      const devLoadList = devKeySet.size
        ? loadList.filter((x) => devKeySet.has(normalizeKey(x.name)))
        : loadList;

      const devCount = devKeySet.size ? devList.length : Math.max(1, new Set(devLoadList.map((x) => normalizeKey(x.name))).size);
      const totalDevOpen = devLoadList.reduce((sum, x) => sum + x.count, 0);
      const avgDevOpen = devCount > 0 ? totalDevOpen / devCount : 0;
      const overloadedDevs = devLoadList.filter((x) => x.count >= Math.max(6, Math.ceil(avgDevOpen * 1.5)));
      const topBottleneck = devLoadList[0] || null;

      const remainingUnits = openTasks.reduce((sum, t) => sum + (1 - progressOf(t) / 100), 0);
      const totalUnits = Math.max(1, list.length);
      const daysAvail = Math.max(0, businessDaysBetween(today, end));

      const realizedSeries = Array.isArray(curveData?.realFull) ? curveData.realFull : [];
      const reportDay = curveData?.report instanceof Date ? curveData.report : today;
      const idxNow = realizedSeries.reduce((idx, p, i) => (p?.t && p.t.getTime() <= reportDay.getTime() ? i : idx), 0);
      const N = Math.min(7, idxNow + 1);
      const idxStart = Math.max(0, idxNow - (N - 1));
      const p0 = realizedSeries[idxStart];
      const p1 = realizedSeries[idxNow];
      const spanDays = p0?.t && p1?.t ? Math.max(1, daysDiff(p0.t, p1.t)) : Math.max(1, daysDiff(start, today));
      const deltaPct = (p0 && p1) ? clamp((p1.y - p0.y), 0, 100) : 0;
      const ratePctPerDay = deltaPct / spanDays;
      const curUnitsPerDay = (ratePctPerDay / 100) * totalUnits;
      const reqUnitsPerDay = daysAvail > 0 ? (remainingUnits / daysAvail) : remainingUnits;
      const reqPctPerDay = (reqUnitsPerDay / totalUnits) * 100;

      const forecast = curveData?.eacDate instanceof Date ? curveData.eacDate : null;
      const gapDaysUteis = forecast && forecast > end ? businessDaysBetween(end, forecast) : 0;

      const problems = [];
      problems.push(`Atividades em aberto: <b>${openTasks.length}</b> (vencidas: <b>${overdueTasks.length}</b>).`);
      if (topBottleneck) {
        problems.push(`Gargalo de desenvolvimento: <b>${escapeHTML(topBottleneck.name)}</b> com <b>${topBottleneck.count}</b> atividade(s) em aberto.`);
      }
      if (overloadedDevs.length) {
        const top = overloadedDevs
          .slice(0, 2)
          .map((x) => `${escapeHTML(x.name)} (${x.count})`)
          .join(" / ");
        problems.push(`Superalocacao estimada (WIP alto): <b>${top}</b>.`);
      } else if (devLoadList.length) {
        problems.push(`Carga atual (devs): media de <b>${avgDevOpen.toFixed(1)}</b> atividade(s) abertas por dev.`);
      }
      if (daysAvail > 0 && remainingUnits > 0) {
        problems.push(
          `Ritmo atual vs necessario: atual ~<b>${curUnitsPerDay.toFixed(2)}</b> unid/dia util, necessario <b>${reqUnitsPerDay.toFixed(
            2
          )}</b> unid/dia util para manter Go Live.`
        );
      }

      const firstBlockers = (Array.isArray(blockers) ? blockers : []).slice(0, 2);
      const blockerText = firstBlockers
        .map((b) => String(b?.title || b?.name || b?.text || "").trim())
        .filter(Boolean)
        .slice(0, 2);

      const actions = [];
      actions.push(`Concluir <b>DESENVOLVIMENTO</b> ate <b>${escapeHTML(fmtBR(targetDevFinish))}</b> para iniciar <b>TESTES</b> em <b>${escapeHTML(fmtBR(plannedTestStart))}</b> sem impactar o cliente.`);

      if (overdueTasks.length) {
        const top = overdueTasks.slice(0, 2).map((t) => escapeHTML(t.title || t.name || "-")).join(" / ");
        actions.push(`Zerar backlog de atraso: <b>${overdueTasks.length}</b> atividade(s) vencida(s). Prioridade imediata: <b>${top}</b>.`);
      } else {
        actions.push(`Manter disciplina de prazos: nao ha atividades vencidas no status report.`);
      }

      if (daysAvail > 0 && remainingUnits > 0) {
        actions.push(`Capacidade vs prazo: restam <b>${Math.ceil(remainingUnits)}</b> unidade(s) de trabalho e <b>${daysAvail}</b> dia(s) uteis ate Go Live. Ritmo minimo: <b>${reqUnitsPerDay.toFixed(1)}</b> unidade(s)/dia util.`);
      } else if (remainingUnits > 0) {
        actions.push(`Capacidade vs prazo: Go Live sem dias uteis restantes. Necessario plano de contingencia (corte/onda) imediatamente.`);
      } else {
        actions.push(`Trabalho restante baixo/zerado pelo apontamento atual; validar checklist de Go Live e criterios de pronto.`);
      }

      if (blockerText.length) {
        actions.push(`Remover impedimentos prioritarios: <b>${escapeHTML(blockerText.join(" / "))}</b>.`);
      } else {
        actions.push(`Checar impedimentos: se houver dependencias externas, registrar e atribuir responsavel com SLA.`);
      }

      const options = [];
      // Option A: productivity
      const openCount = openTasks.length;
      const reqTasksPerDay = daysAvail > 0 ? (openCount / daysAvail) : openCount;
      const curTasksPerDay = daysAvail > 0 ? (curUnitsPerDay) : 0; // units/day ~= tasks/day when tasks are 0% remaining
      options.push(
        `Opcao A (produtividade): elevar ritmo para <b>${reqUnitsPerDay.toFixed(1)}</b> unidade(s)/dia util (${reqTasksPerDay.toFixed(
          1
        )} atividade(s)/dia) ate <b>${escapeHTML(fmtBR(end))}</b>. Alavancas: reforco de squad, overtime pontual, remover fila de aprovacao/validacao.`
      );

      // Option B: replan/waves
      options.push(
        `Opcao B (replanejamento): executar em ondas (paralelismo controlado). Iniciar TESTES por pacote assim que cada entrega de DESENV concluir, mantendo uma fila diaria de homologacao e correcoes; antecipar preparacao de DEPLOY/Go Live em paralelo (checklist, acessos, janelas, rollback).`
      );

      // Option C: scope cut (only if needed)
      if (daysAvail > 0 && curUnitsPerDay > 0.0001) {
        const targetUnits = curUnitsPerDay * daysAvail;
        const cutUnits = Math.max(0, remainingUnits - targetUnits);
        if (cutUnits > 0.25) {
          const cutCount = Math.max(1, Math.ceil(cutUnits));
          const candidates = openTasks
            .slice()
            .sort((a, b) => {
              const pa = progressOf(a);
              const pb = progressOf(b);
              if (pa !== pb) return pa - pb;
              const da = resolveEndDate(a);
              const db = resolveEndDate(b);
              return (db ? db.getTime() : -1) - (da ? da.getTime() : -1);
            })
            .slice(0, 3)
            .map((t) => escapeHTML(t.title || t.name || "-"));
          options.push(
            `Opcao C (escopo): mover <b>${cutCount}</b> item(ns) para pos Go Live para caber no ritmo atual. Candidatos iniciais (para decisao): <b>${candidates.join(
              " / "
            )}</b>.`
          );
        }
      }

      return {
        delayDays: gapDaysUteis > 0 ? Math.round(gapDaysUteis) : dd,
        gapTxt,
        forecastDate: forecast,
        goLive: end,
        actions,
        options,
        impediments: blockerText,
        problems
      };
    }

    function resolveOwnerLabel(t){
      const members = parseMembersLocal(t);
      const raw = members.length ? members[0] : (t?.responsavel || t?.responsible || t?.assignee || t?.owner || "");
      const name = String(raw || "").trim();
      return name || "-";
    }

    function ownerShortLabel(name){
      const parts = String(name || "").trim().split(/\s+/g).filter(Boolean);
      if (!parts.length || parts[0] === "-") return "-";
      const first = parts[0];
      const last = parts.length > 1 ? parts[parts.length - 1] : "";
      const lastInit = last ? `${last[0]}.` : "";
      return `${first} ${lastInit}`.trim().toUpperCase();
    }

    function initialsFromNameLocal(name){
      const parts = String(name || "").trim().split(/\s+/g).filter(Boolean);
      if (!parts.length || parts[0] === "-") return "-";
      if (parts.length === 1) return parts[0].slice(0, 2).toUpperCase();
      return `${parts[0][0]}${parts[parts.length - 1][0]}`.toUpperCase();
    }

    function resolveCompletedDate(t){
      const d = parseTaskDate(
        t?.dataConclusao ||
        t?.completedAt ||
        t?.doneAt ||
        t?.finishedAt ||
        t?.completed ||
        t?._c ||
        ""
      ) || parseTaskDate(
        t?.actualFinish ||
        t?.ActualFinish ||
        t?.Fim ||
        t?.FIM ||
        t?.["Fim"] ||
        t?.["Finish"] ||
        t?.finish ||
        t?.Finish ||
        t?.end ||
        t?.due ||
        ""
      );
      return d;
    }

    function resolveStartDate(t){
      return parseTaskDate(
        t?.start ||
        t?.inicio ||
        t?.begin ||
        t?.startDate ||
        t?.dataInicio ||
        t?.Inicio ||
        t?.INICIO ||
        t?.["Inicio"] ||
        t?.["INICIO"] ||
        t?.["Início"] ||
        t?.["INÍCIO"] ||
        t?.Start ||
        t?.START ||
        t?.["Start"] ||
        t?.["START"] ||
        t?.["Start Date"] ||
        t?.["START DATE"] ||
        ""
      );
    }

    function resolveEndDate(t){
      return parseTaskDate(
        t?.end ||
        t?.termino ||
        t?.due ||
        t?.endDate ||
        t?.dataFim ||
        t?.dueDate ||
        t?.Fim ||
        t?.FIM ||
        t?.["Fim"] ||
        t?.["FIM"] ||
        t?.["Término"] ||
        t?.["TERMINO"] ||
        t?.finish ||
        t?.Finish ||
        t?.FINISH ||
        t?.["Finish"] ||
        t?.["FINISH"] ||
        t?.["Finish Date"] ||
        t?.["FINISH DATE"] ||
        ""
      );
    }

    function resolveProgressPct(t){
      if (!t || typeof t !== "object") return 0;
      // If status already indicates "done", force 100% to avoid relying on missing % fields.
      try {
        if (isDoneTaskLocal(t)) return 100;
      } catch (_err) {}

      const candidates = [
        t?.progress,
        t?.progressPct,
        t?.progresso,
        t?.percent,
        t?.percentage,
        t?.pct,

        // Common import variants (case/localized keys)
        t?.Progress,
        t?.PROGRESS,
        t?.Progresso,
        t?.PROGRESSO,
        t?.percentComplete,
        t?.PercentComplete,
        t?.["Progresso"],
        t?.["PROGRESSO"],
        t?.["Progress"],
        t?.["PROGRESS"],
        t?.["Percent Complete"],
        t?.["% Complete"],
        t?.["% Concluido"],
        t?.["% Concluído"]
      ];

      for (const value of candidates) {
        const v = parsePercentValue(value);
        if (v != null) return clamp(v, 0, 100);
      }

      // Fuzzy scan: find a key that looks like progress/percent complete.
      try {
        const normKey = (value) =>
          String(value || "")
            .trim()
            .toLowerCase()
            .normalize("NFD")
            .replace(/[\u0300-\u036f]/g, "")
            .replace(/[^a-z0-9]+/g, "");
        const keys = Object.keys(t);
        const hit = keys.find((k) => {
          const nk = normKey(k);
          return (
            nk.includes("progress") ||
            nk.includes("progresso") ||
            nk.includes("percentcomplete") ||
            nk.includes("percentualconcluido") ||
            nk === "percentual" ||
            nk === "porcentagem"
          );
        });
        if (hit) {
          const v = parsePercentValue(t[hit]);
          if (v != null) return clamp(v, 0, 100);
        }
      } catch (_err) {}

      return 0;
    }

    let __cardProjectCtx = null;

    function normMacroKey(value){
      return String(value || "")
        .trim()
        .toLowerCase()
        .normalize("NFD")
        .replace(/[\u0300-\u036f]/g, "")
        .replace(/[^a-z0-9]+/g, "");
    }

    function pickMacroLabelForTask(t){
      if (!t || typeof t !== "object") return "";
      const candidates = [
        t.package,
        t.pkg,
        t.macro,
        t.pacote,
        t.subEpic,
        t.subepic,
        t.sub_epic
      ];
      for (const c of candidates) {
        const s = String(c || "").trim();
        if (s) return s;
      }
      return "";
    }

    function getMacroParentsMap(proj){
      if (!proj || typeof proj !== "object") return {};
      if (proj.__macroParentsNorm && typeof proj.__macroParentsNorm === "object") return proj.__macroParentsNorm;
      const raw = proj.packageParents || proj.package_parents || {};
      const out = {};
      try {
        if (raw && typeof raw === "object" && !Array.isArray(raw)) {
          Object.entries(raw).forEach(([k, v]) => {
            const kk = normMacroKey(k);
            const vv = String(v || "").trim();
            if (!kk) return;
            if (vv) out[kk] = vv;
          });
        }
      } catch (_err) {}
      proj.__macroParentsNorm = out;
      return out;
    }

    function macroPathForTask(t, proj){
      const macro = pickMacroLabelForTask(t);
      if (!macro) return "";
      const map = getMacroParentsMap(proj);
      const parts = [macro];
      let cur = macro;
      const seen = new Set([normMacroKey(cur)]);
      for (let guard = 0; guard < 12; guard += 1) {
        const parent = map[normMacroKey(cur)] || "";
        if (!parent) break;
        const pk = normMacroKey(parent);
        if (!pk || seen.has(pk)) break;
        parts.unshift(parent);
        seen.add(pk);
        cur = parent;
      }
      return parts.join(" > ");
    }

    function renderBiDoneItem(t){
      const name = escapeHTML(t.title || t.name || t.item || "-");
      const epic = epicLabelForCard(t);
      const macroPath = macroPathForTask(t, __cardProjectCtx);
      const ownerFull = resolveOwnerLabel(t);
      const ownerOk = ownerFull && ownerFull !== "-" ? true : false;
      const ownerAvatar = ownerOk ? escapeHTML(initialsFromNameLocal(ownerFull)) : "";
      const ownerName = ownerOk ? escapeHTML(ownerFull) : "";
      const start = resolveStartDate(t);
      const end = resolveEndDate(t);
      const startTxt = escapeHTML(fmtBR(start) || "-");
      const endTxt = escapeHTML(fmtBR(end) || "-");
      const sched = scheduleTagForCard(t, "done");
      return `
        <div class="bi-item bi-item--done" title="${name}">
          <div class="bi-itemHead">

    function scheduleTagForCard(t, kind){
      // Reference layout uses a "health" tag separate from the workflow column.
      // Keep it deterministic and cheap: overdue => ATRASADO, due soon => EM RISCO, else EM DIA.
      if (kind === "done") return { cls: "em-dia", text: "EM DIA" };
      const lateDays = calcLateDays(t, true);
      if (Number.isFinite(lateDays) && lateDays > 0) return { cls: "atrasado", text: "ATRASADO" };
      const today = new Date(); today.setHours(0,0,0,0);
      const due = parseTaskDate(t?.due || t?.end || t?.endDate || t?.dataFim || "");
      if (due) {
        due.setHours(0,0,0,0);
        const daysToDue = daysDiff(today, due); // due - today
        if (daysToDue >= 0 && daysToDue <= 3) return { cls: "em-risco", text: "EM RISCO" };
      }
      return { cls: "em-dia", text: "EM DIA" };
    }

        tasks: curveTasks,

      const payloadBaseline = vm?.overall?.baselinePct;
      const overrideBaseline = payloadBaseline != null && Number.isFinite(Number(payloadBaseline))
        ? Number(payloadBaseline) : null;

      const curve = renderSCurveSvg({

        start: curveData.start,

      const flowHtml = `

      const blockersRaw = vm.project?.blockers || vm.project?.impediments || vm.project?.impedimentos || vm.project?.issues || [];

      const blockersCount = blockers.length;

      const goLiveShort = (goLive instanceof Date)

        : (String(proj.goLiveDate||"").slice(0,5) || "-");
      const eacLabel = escapeHTML(fmtBR(eac) || "-");

      const eacWide = escapeHTML(fmtBR(eac) || "-");
      const deltaLabel =
        delayDays > 0
          ? `+${Math.round(delayDays)}d`

            ? `${Math.round(delayDays)}d`

      const confidencePct = (() => {
        const list = Array.isArray(vm?.tasks) ? vm.tasks : [];
        const total = list.length || 0;
        if (!total) return 0;
        let dueCount = 0;
        let progCount = 0;
        for (const t of list) {
          if (!t) continue;
          if (isValidDate(resolveEndDate(t))) dueCount += 1;
          const p = clamp(Number(resolveProgressPct(t) || 0), 0, 100);
          if (p > 0 || isDoneTaskLocal(t)) progCount += 1;
        }
        let score = 50;
        score += dueCount / Math.max(1, total) >= 0.7 ? 12 : dueCount / Math.max(1, total) >= 0.4 ? 6 : -8;
        score += progCount / Math.max(1, total) >= 0.7 ? 18 : progCount / Math.max(1, total) >= 0.4 ? 10 : -6;
        if (delayDays === 0) score += 8;
        if (delayDays > 20) score -= 8;
        return clamp(Math.round(score), 20, 95);
      })();

      const lastUpdateWide = escapeHTML(String(proj.reportDate || fmtBR(curveData?.report) || "-"));

      const statusDotCls = statusHealthCls === "bad" ? "bad" : statusHealthCls === "warn" ? "warn" : "";

    function setupCurveEvidence(root, curveData){
      const box = root.querySelector(".svgBox");
      if (!box || !curveData) return;
      if (box.dataset.evidenceWired) return;
      box.dataset.evidenceWired = "true";

      const svg = box.querySelector("svg");
      const line = box.querySelector(".curve-evidence-line");
      const tooltip = box.querySelector(".curve-tooltip");
      const realPath = svg.querySelector("#curve-real-path");
      const hitPath = svg.querySelector("#curve-real-hit") || realPath;
      if (!line || !tooltip || !svg || !hitPath) return;

      const start = curveData.start;
      const end = curveData.end;
      const baselinePoints = curveData.baselineFull || curveData.baseline || [];
      const realPoints = curveData.realFull || curveData.real || [];
      const viewBox = svg.getAttribute("viewBox") || "0 0 920 258";
      const vbParts = viewBox.split(/\s+/).map(Number);
      const vbMinX = Number.isFinite(vbParts[0]) ? vbParts[0] : 0;
      const vbMinY = Number.isFinite(vbParts[1]) ? vbParts[1] : 0;
      const vbWidth = vbParts[2] || 920;
      const vbHeight = vbParts[3] || 258;
      const pad = 16;
      const plotHeight = 240;
      const plotTop = pad;
      const plotBottom = plotHeight - pad;
      const plotLeft = vbMinX;
      const plotRight = vbMinX + vbWidth;

      const gapColor = (info) => {
        if (info?.color) return info.color;
        const cls = info?.cls;
        if (cls === "gap-ok") return "#2f8f61";
        if (cls === "gap-low") return "#d97706";
        if (cls === "gap-risk") return "#b45309";
        if (cls === "gap-delayed") return "#ea580c";
        return "#9b1c23";
      };

      const findPathPointAtX = (pathEl, xTarget) => {
        if (!pathEl || typeof pathEl.getTotalLength !== "function") return null;
        const total = pathEl.getTotalLength();
        if (!Number.isFinite(total) || total <= 0) return null;
        let low = 0;
        let high = total;
        for (let i = 0; i < 24; i += 1) {
          const mid = (low + high) / 2;
          const pt = pathEl.getPointAtLength(mid);
          if (pt.x < xTarget) low = mid;
          else high = mid;
        }
        return pathEl.getPointAtLength((low + high) / 2);
      };

      const update = (ev) => {
        const rect = box.getBoundingClientRect();
        const svgRect = svg.getBoundingClientRect();
        const svgLeft = svgRect.left - rect.left;
        const svgTop = svgRect.top - rect.top;
        const svgRight = svgLeft + svgRect.width;
        const svgBottom = svgTop + svgRect.height;
        const xLocal = clamp(ev.clientX - svgRect.left, 0, svgRect.width);
        const yLocalRaw = clamp(ev.clientY - svgRect.top, 0, svgRect.height);
        const xSvg = vbMinX + (xLocal / Math.max(1, svgRect.width)) * vbWidth;
        const ySvgRaw = vbMinY + (yLocalRaw / Math.max(1, svgRect.height)) * vbHeight;
        if (ySvgRaw < plotTop || ySvgRaw > plotBottom || xSvg < plotLeft || xSvg > plotRight) {
          line.style.display = "none";
          tooltip.style.display = "none";
          return;
        }
        const ratio = clamp((xSvg - plotLeft) / Math.max(1, plotRight - plotLeft), 0, 1);
        const t = start.getTime() + ratio * (end.getTime() - start.getTime());
        const baseNow = interpolateAt(baselinePoints, t);
        const realNow = interpolateAt(realPoints, t);
        const gap = Math.round((baseNow - realNow) * 10) / 10;
        const gapInfo = gapStatusFromValue(gap, baseNow, realNow);
        const ySvgFallback = pad + (1 - clamp(realNow, 0, 100) / 100) * (plotHeight - pad * 2);
        const snapPoint = findPathPointAtX(realPath, xSvg);
        const ySvg = snapPoint && Number.isFinite(snapPoint.y) ? snapPoint.y : ySvgFallback;
        const snapThreshold = (12 / Math.max(1, svgRect.height)) * vbHeight;
        if (Math.abs(ySvgRaw - ySvg) > snapThreshold) {
          line.style.display = "none";
          tooltip.style.display = "none";
          return;
        }
        const yLocal = svgTop + ((ySvg - vbMinY) / vbHeight) * svgRect.height;
        const xLine = clamp(svgLeft + xLocal, svgLeft, svgRight);
        const lineTop = svgTop + ((plotTop - vbMinY) / vbHeight) * svgRect.height;
        const lineHeight = ((plotBottom - plotTop) / vbHeight) * svgRect.height;

        line.style.display = "block";
        line.style.left = `${xLine}px`;
        line.style.top = `${lineTop}px`;
        line.style.height = `${lineHeight}px`;
        tooltip.style.display = "block";
        tooltip.style.visibility = "hidden";
        tooltip.style.left = "0px";
        tooltip.style.top = "0px";
        const realLabel = formatPct(realNow);
        const baseLabel = formatPct(baseNow);
        const gapLabel = formatGapPlain(gap);
        tooltip.innerHTML = `
          <div class="tip-date">${fmtBR(new Date(t))}</div>
          <div class="tip-row"><span>Realizado</span> <span class="tip-real">${realLabel}</span></div>
          <div class="tip-row"><span>Planejado</span> <span class="tip-base">${baseLabel}</span></div>
          <div class="tip-gap" style="color:${gapColor(gapInfo)}">GAP ${gapLabel}</div>
        `;
        const tipW = tooltip.offsetWidth || 180;
        const tipH = tooltip.offsetHeight || 80;
        let left = xLine + 12;
        if (left + tipW + 8 > svgRight) left = svgRight - tipW - 8;
        if (left < svgLeft + 8) left = svgLeft + 8;
        let top = yLocal - tipH - 12;
        if (top < svgTop + 8) top = yLocal + 12;
        if (top + tipH + 8 > svgBottom) top = svgBottom - tipH - 8;
        if (top < svgTop + 8) top = svgTop + 8;
        tooltip.style.left = `${left}px`;
        tooltip.style.top = `${top}px`;
        tooltip.style.visibility = "visible";
      };

      hitPath.addEventListener("mousemove", update);
      hitPath.addEventListener("mouseleave", () => {
        line.style.display = "none";
        tooltip.style.display = "none";
      });
    }

    function renderItem(t, showUrgency, forceTag){
      const name = escapeHTML(t.title || t.name || t.item || "-");
      const due = parseTaskDate(t.due);

      if(forceTag==="ok") tag = {cls:"ok", text:"Concluido"};
      else if(forceTag==="warn") tag = {cls:"warn", text:"Em andamento"};
      else if(showUrgency){
        const lateDays = calcLateDays(t);
        const meta = tagFromDelta(lateDays);
        tag = meta;
      }else{
        // proximo passo / geral
        const lateDays = calcLateDays(t, true);
        if(lateDays > 0) tag = {cls:"bad", text:`Atrasada +${lateDays}d`};
        else tag = {cls:"ok", text:"Planejada"};

      return `

            <span>•</span>

    function calcLateDays(t, onlyIfOverdue=false){
      const today = new Date(); today.setHours(0,0,0,0);
      const due = parseTaskDate(t.due);
      if(!due) return null;
      due.setHours(0,0,0,0);
      const diff = daysDiff(due, today); // >0 => atrasado
      if(onlyIfOverdue) return diff > 0 ? diff : 0;
      return diff;
    }

    function formatGap(g, baselinePct = null, realizedPct = null){
      const v = Math.round(g*10)/10;
      const sign = v > 0 ? "+" : (v < 0 ? "-" : "");
      const abs = Math.abs(v);
      const status = gapStatusFromValue(v, baselinePct, realizedPct);
      const tone = status?.color
        ? status.color
        : status.cls === "gap-ok"
          ? "#2f8f61"
          : status.cls === "gap-low"
            ? "#d97706"
            : status.cls === "gap-risk"
              ? "#b45309"
              : status.cls === "gap-delayed"
                ? "#ea580c"
                : "#9b1c23";
      return `<span style="color:${tone}; font-weight: 450">${sign}${abs}pp</span>`;
    }

    function formatGapPlain(g){
      const v = Math.round(g*10)/10;
      const sign = v > 0 ? "+" : (v < 0 ? "-" : "");
      const abs = Math.abs(v);
      const label = Number.isInteger(abs) ? String(abs) : abs.toFixed(1);
      return `${sign}${label}pp`;
    }

    function formatPct(value){
      const v = Math.round(value * 10) / 10;
      return `${v.toFixed(1)}%`;
    }

    function gapStatusFromValue(g, baselinePct = null, realizedPct = null){
      const base = Number(baselinePct);
      const real = Number(realizedPct);
      if (Number.isFinite(base) && Number.isFinite(real)) {
        const baseRounded = Math.round(base);
        if (baseRounded >= 100 && real < 100) {
          return { cls: "gap-critical", label: "Critico", color: "#9b1c23" };
        }
      }
      const val = Number(g);
      if (!Number.isFinite(val)) return { cls: "gap-ok", label: "Em dia", color: "#2f8f61" };
      // Rule (PP): <=3 => Em dia (includes negative), >3-10 baixo, >10-19 potencial, 20-29 alto, 30+ critico.
      if (val <= 3) return { cls: "gap-ok", label: "Em dia", color: "#2f8f61" };
      if (val <= 10) return { cls: "gap-low", label: "Baixo risco", color: "#d97706" };
      if (val <= 19) return { cls: "gap-risk", label: "Potencial risco", color: "#b45309" };
      if (val <= 29) return { cls: "gap-delayed", label: "Alto risco", color: "#ea580c" };
      return { cls: "gap-critical", label: "Critico", color: "#9b1c23" };
    }

    function escapeHTML(s){
      return String(s ?? "")
        .replaceAll("&","&amp;")
        .replaceAll("<","&lt;")
        .replaceAll(">","&gt;")
        .replaceAll('"',"&quot;");
    }
